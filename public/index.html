    // Gold reinforcement bands
    graphics.lineStyle(2, 0xC8960C, 0.35);
    graphics.lineBetween(cx - 198, cy + 100, cx + 198, cy + 100);
    graphics.lineBetween(cx - 198, cy + 150, cx + 198, cy + 150);

    // ── TIER 2: Main keep — polished stone walls ──
    graphics.fillStyle(0x5A6A7A, 1);
    graphics.fillRect(cx - 150, cy - 120, 300, 200);
    // Lighter stone patches for polished look
    graphics.fillStyle(0x7A8A9A, 0.3);
    for (let px = -130; px < 130; px += 32) {
      for (let py = -110; py < 70; py += 28) {
        graphics.fillRect(cx + px + ((px*5)&8), cy + py, 16, 12);
      }
    }
    // Gold trim bands on keep
    graphics.lineStyle(2, 0xC8960C, 0.4);
    graphics.lineBetween(cx - 148, cy - 50, cx + 148, cy - 50);
    graphics.lineBetween(cx - 148, cy + 20, cx + 148, cy + 20);

    // ── Left guard tower ──
    graphics.fillStyle(0x4A5A6A, 1);
    graphics.fillRect(cx - 200, cy - 180, 70, 260);
    // ── Right guard tower ──
    graphics.fillRect(cx + 130, cy - 180, 70, 260);

    // ── TIER 3: Central spire — tall with blue crystal ──
    graphics.fillStyle(0x5A6A7A, 1);
    graphics.fillRect(cx - 35, cy - 300, 70, 200);
    // Spire narrows to peak
    graphics.fillStyle(0x1A4ABA, 1);
    graphics.fillTriangle(cx, cy - 370, cx - 32, cy - 300, cx + 32, cy - 300);
    // Spire stone lines
    graphics.lineStyle(1, 0x4A5A6A, 0.3);
    for (let r = cy - 290; r < cy - 110; r += 18) graphics.lineBetween(cx - 33, r, cx + 33, r);

    // ── Blue glowing crystal at spire top ──
    const crystalP = 0.6 + Math.sin(t * 0.07) * 0.3;
    graphics.fillStyle(0x4A8FE0, 0.12 * crystalP);
    graphics.fillCircle(cx, cy - 375, 28);
    graphics.fillStyle(0x2266DD, 0.3 * crystalP);
    graphics.fillCircle(cx, cy - 375, 14);
    graphics.fillStyle(0x66AAFF, crystalP);
    graphics.fillCircle(cx, cy - 375, 5);

    // ── Blue pointed roofs on guard towers ──
    graphics.fillStyle(0x1A4ABA, 1);
    graphics.fillTriangle(cx - 165, cy - 240, cx - 208, cy - 178, cx - 122, cy - 178);
    graphics.fillTriangle(cx + 165, cy - 240, cx + 122, cy - 178, cx + 208, cy - 178);

    // ── Gold flags on towers ──
    graphics.lineStyle(2, 0xAAAAAA, 1);
    graphics.lineBetween(cx - 165, cy - 240, cx - 165, cy - 275);
    graphics.lineBetween(cx + 165, cy - 240, cx + 165, cy - 275);
    const flagWave = Math.sin(t * 0.06) * 4;
    graphics.fillStyle(0x4A8FE0, 0.9);
    graphics.fillRect(cx - 165, cy - 275, 30 + flagWave, 18);
    graphics.fillRect(cx + 165, cy - 275, 30 + flagWave, 18);
    // Gold lion emblem on flags
    graphics.fillStyle(0xC8960C, 0.7);
    graphics.fillCircle(cx - 150, cy - 266, 4);
    graphics.fillCircle(cx + 180, cy - 266, 4);

    // ── Refined battlements — clean square merlons ──
    for (let i = 0; i < 10; i++) {
      graphics.fillStyle(0x6A7A8A, 1);
      graphics.fillRect(cx - 190 + i * 40, cy + 50, 16, 14);
    }
    for (let i = 0; i < 8; i++) {
      graphics.fillStyle(0x5A6A7A, 1);
      graphics.fillRect(cx - 142 + i * 38, cy - 130, 14, 12);
    }
    // Tower battlements
    for (let i = 0; i < 4; i++) {
      graphics.fillStyle(0x5A6A7A, 1);
      graphics.fillRect(cx - 198 + i * 18, cy - 190, 10, 12);
      graphics.fillRect(cx + 132 + i * 18, cy - 190, 10, 12);
    }

    // ── Alliance lion shield emblem on front ──
    graphics.fillStyle(0x000000, 0.3);
    graphics.fillCircle(cx, cy + 10, 50);
    graphics.fillStyle(0x2244AA, 0.95);
    graphics.fillRoundedRect(cx - 38, cy - 30, 76, 95, 8);
    graphics.lineStyle(3, 0xC8960C, 0.9);
    graphics.strokeRoundedRect(cx - 38, cy - 30, 76, 95, 8);
    // Gold cross on shield
    graphics.lineStyle(4, 0xC8960C, 0.85);
    graphics.lineBetween(cx, cy - 22, cx, cy + 56);
    graphics.lineBetween(cx - 26, cy + 15, cx + 26, cy + 15);
    // Lion head silhouette (simple)
    graphics.fillStyle(0xC8960C, 0.6);
    graphics.fillCircle(cx, cy + 2, 12);
    graphics.fillTriangle(cx, cy - 12, cx - 8, cy + 4, cx + 8, cy + 4);

    // ── Gold torch brackets with holy blue flames ──
    for (const txOff of [-110, 110, -55, 55]) {
      graphics.fillStyle(0xC8960C, 0.7);
      graphics.fillRect(cx + txOff - 3, cy - 60, 6, 18);
      const flicker = Math.sin(t * 0.14 + txOff) * 3;
      graphics.fillStyle(0x4488FF, 0.6);
      graphics.fillTriangle(cx + txOff, cy - 76 + flicker, cx + txOff - 5, cy - 60, cx + txOff + 5, cy - 60);
      graphics.fillStyle(0x88BBFF, 0.4);
      graphics.fillTriangle(cx + txOff, cy - 70 + flicker, cx + txOff - 3, cy - 62, cx + txOff + 3, cy - 62);
    }

    // ── Stained glass windows ──
    for (const wx of [-90, 90]) {
      graphics.fillStyle(0x1A2A5A, 0.9);
      graphics.fillRect(cx + wx - 8, cy - 50, 16, 30);
      graphics.fillStyle(0x4A8FE0, 0.3 + Math.sin(t * 0.05) * 0.1);
      graphics.fillRect(cx + wx - 6, cy - 48, 12, 26);
      // Window arch
      graphics.fillStyle(0x5A6A7A, 1);
      graphics.fillRect(cx + wx - 9, cy - 52, 18, 4);
    }

    // ── Grand gate with gold portcullis ──
    graphics.fillStyle(0x3A2A18, 1);
    graphics.fillRect(cx - 35, cy + 170, 70, 50);
    graphics.lineStyle(2, 0xC8960C, 0.6);
    for (let gx2 = cx - 30; gx2 <= cx + 30; gx2 += 10) graphics.lineBetween(gx2, cy + 170, gx2, cy + 220);
    graphics.lineBetween(cx - 35, cy + 190, cx + 35, cy + 190);
    // Gate arch
    graphics.fillStyle(0x6A7A8A, 1);
    graphics.fillRect(cx - 40, cy + 162, 80, 12);

    // ── Gold trim outlines ──
    graphics.lineStyle(2, 0xC8960C, 0.5);
    graphics.strokeRect(cx - 200, cy + 60, 400, 160);
    graphics.strokeRect(cx - 150, cy - 120, 300, 200);

    // ── HP bar above spire ──
    drawHPBar(cx - 200, cy - 390, 400, 12, s.hp, s.maxHp, 0xC8960C);

  } else if (s.structureType === 'base' && !isA) {
    // ═══ HORDE ORCISH STRONGHOLD at (4650, 1200) ═══════
    const hx = 4650, hy = 1200;

    // ── Dark red atmospheric glow ──
    graphics.fillStyle(0x8B0000, 0.1 + Math.sin(t * 0.03) * 0.05);
    graphics.fillCircle(hx, hy, 300);
    graphics.fillStyle(0x440000, 0.06);
    graphics.fillCircle(hx, hy + 100, 250);

    // ── TIER 1: Wide base platform — volcanic rock ──
    graphics.fillStyle(0x1A1008, 1);
    graphics.fillRect(hx - 200, hy + 60, 400, 160);
    // Stone texture patches
    graphics.fillStyle(0x2A1A08, 0.5);
    for (let px = -180; px < 180; px += 40) {
      for (let py = 70; py < 210; py += 35) {
        graphics.fillRect(hx + px + ((px*3)&7), hy + py + ((py*5)&5), 20, 16);
      }
    }
    // Iron reinforcement bands
    graphics.lineStyle(3, 0x2A2A2A, 0.7);
    graphics.lineBetween(hx - 198, hy + 100, hx + 198, hy + 100);
    graphics.lineBetween(hx - 198, hy + 150, hx + 198, hy + 150);

    // ── TIER 2: Middle keep — dark iron walls ──
    graphics.fillStyle(0x0A0808, 1);
    graphics.fillRect(hx - 150, hy - 120, 300, 200);
    // Darker stone patches
    graphics.fillStyle(0x1A1008, 0.4);
    for (let px = -130; px < 130; px += 35) {
      for (let py = -110; py < 70; py += 30) {
        graphics.fillRect(hx + px + ((px*7)&9), hy + py, 18, 14);
      }
    }
    // Iron bands on middle keep
    graphics.lineStyle(2, 0x2A2A2A, 0.6);
    graphics.lineBetween(hx - 148, hy - 50, hx + 148, hy - 50);
    graphics.lineBetween(hx - 148, hy + 20, hx + 148, hy + 20);

    // ── TIER 3: Central spire — tall black tower ──
    graphics.fillStyle(0x0A0808, 1);
    graphics.fillRect(hx - 40, hy - 320, 80, 220);
    // Spire narrows at top
    graphics.fillStyle(0x0A0808, 1);
    graphics.fillTriangle(hx, hy - 380, hx - 35, hy - 320, hx + 35, hy - 320);
    // Spire stone texture
    graphics.lineStyle(1, 0x1A1A1A, 0.3);
    for (let r = hy - 310; r < hy - 110; r += 20) graphics.lineBetween(hx - 38, r, hx + 38, r);

    // ── Red glowing crystal at spire top ──
    const crystalPulse = 0.6 + Math.sin(t * 0.08) * 0.3;
    graphics.fillStyle(0x8B0000, 0.15 * crystalPulse);
    graphics.fillCircle(hx, hy - 385, 30); // outer glow
    graphics.fillStyle(0xCC0000, 0.3 * crystalPulse);
    graphics.fillCircle(hx, hy - 385, 15);
    graphics.fillStyle(0xFF2222, crystalPulse);
    graphics.fillCircle(hx, hy - 385, 6); // bright core

    // ── 7 brutal iron spikes along middle keep top ──
    for (let i = 0; i < 7; i++) {
      const sx2 = hx - 132 + i * 44;
      graphics.fillStyle(0x1A1A1A, 1);
      graphics.fillRect(sx2 - 6, hy - 140, 12, 28);
      graphics.fillStyle(0x8B0000, 1);
      graphics.fillTriangle(sx2, hy - 172, sx2 - 8, hy - 142, sx2 + 8, hy - 142);
    }

    // ── Crude orcish battlements — thick chunky merlons ──
    for (let i = 0; i < 10; i++) {
      graphics.fillStyle(0x1A1008, 1);
      graphics.fillRect(hx - 190 + i * 40, hy + 50, 18, 16);
    }
    for (let i = 0; i < 8; i++) {
      graphics.fillStyle(0x0A0808, 1);
      graphics.fillRect(hx - 142 + i * 38, hy - 130, 16, 14);
    }

    // ── Hanging iron chains on sides ──
    graphics.lineStyle(2, 0x2A2A2A, 0.5);
    for (let cy2 = hy - 100; cy2 < hy + 50; cy2 += 10) {
      graphics.strokeCircle(hx - 155, cy2, 4);
      graphics.strokeCircle(hx + 155, cy2, 4);
    }

    // ── Red war banner from spire ──
    graphics.fillStyle(0x8B0000, 0.9);
    const bannerWave = Math.sin(t * 0.06) * 5;
    graphics.fillRect(hx + 40, hy - 340, 50 + bannerWave, 80);
    graphics.lineStyle(1, 0x550000, 0.7);
    graphics.strokeRect(hx + 40, hy - 340, 50 + bannerWave, 80);
    // Crude skull symbol on banner
    graphics.fillStyle(0x000000, 0.6);
    graphics.fillCircle(hx + 65, hy - 310, 10);
    graphics.fillRect(hx + 59, hy - 302, 12, 6);

    // ── Large orcish skull on front gate ──
    graphics.fillStyle(0x000000, 0.4);
    graphics.fillCircle(hx, hy + 30, 55); // dark backing
    graphics.fillStyle(0xD4C8A0, 0.95);
    graphics.fillCircle(hx, hy + 20, 40); // cranium
    graphics.fillRect(hx - 25, hy + 55, 50, 20); // jaw
    // Eye sockets
    graphics.fillStyle(0x0A0808, 1);
    graphics.fillCircle(hx - 14, hy + 12, 9);
    graphics.fillCircle(hx + 14, hy + 12, 9);
    // Glowing red eyes
    graphics.fillStyle(0xCC2222, 0.6 + Math.sin(t * 0.1) * 0.3);
    graphics.fillCircle(hx - 14, hy + 12, 4);
    graphics.fillCircle(hx + 14, hy + 12, 4);
    // Nose
    graphics.fillStyle(0x0A0808, 0.9);
    graphics.fillTriangle(hx, hy + 28, hx - 6, hy + 44, hx + 6, hy + 44);
    // Teeth
    for (let tx2 = -20; tx2 <= 20; tx2 += 8) {
      graphics.fillStyle(0xD4C8A0, 0.85);
      graphics.fillRect(hx + tx2, hy + 57, 5, 12);
    }
    // Tusks (orcish)
    graphics.fillStyle(0xD4C8A0, 0.9);
    graphics.fillTriangle(hx - 28, hy + 40, hx - 36, hy + 18, hx - 22, hy + 35);
    graphics.fillTriangle(hx + 28, hy + 40, hx + 36, hy + 18, hx + 22, hy + 35);

    // ── Iron torch brackets with flames ──
    for (const txOff of [-120, 120, -60, 60]) {
      // Bracket
      graphics.fillStyle(0x2A2A2A, 0.8);
      graphics.fillRect(hx + txOff - 3, hy - 60, 6, 20);
      // Flame (flickering)
      const flicker = Math.sin(t * 0.15 + txOff) * 3;
      graphics.fillStyle(0xFF6600, 0.7);
      graphics.fillTriangle(hx + txOff, hy - 78 + flicker, hx + txOff - 6, hy - 60, hx + txOff + 6, hy - 60);
      graphics.fillStyle(0xFFAA00, 0.5);
      graphics.fillTriangle(hx + txOff, hy - 72 + flicker, hx + txOff - 3, hy - 62, hx + txOff + 3, hy - 62);
    }

    // ── Crude orcish runes on face ──
    graphics.lineStyle(2, 0x0A0505, 0.4);
    // Rune 1
    graphics.lineBetween(hx - 80, hy - 80, hx - 80, hy - 50);
    graphics.lineBetween(hx - 80, hy - 65, hx - 68, hy - 55);
    // Rune 2
    graphics.lineBetween(hx + 80, hy - 80, hx + 80, hy - 50);
    graphics.lineBetween(hx + 80, hy - 80, hx + 70, hy - 65);
    graphics.lineBetween(hx + 80, hy - 50, hx + 70, hy - 65);
    // Rune 3
    graphics.lineBetween(hx - 100, hy + 100, hx - 90, hy + 130);
    graphics.lineBetween(hx - 100, hy + 115, hx - 88, hy + 110);

    // ── Gate — iron portcullis at base ──
    graphics.fillStyle(0x0A0500, 1);
    graphics.fillRect(hx - 35, hy + 170, 70, 50);
    graphics.lineStyle(3, 0x2A2A2A, 0.8);
    for (let gx2 = hx - 30; gx2 <= hx + 30; gx2 += 10) graphics.lineBetween(gx2, hy + 170, gx2, hy + 220);
    graphics.lineBetween(hx - 35, hy + 190, hx + 35, hy + 190);
    graphics.lineBetween(hx - 35, hy + 205, hx + 35, hy + 205);

    // ── Dark border ──
    graphics.lineStyle(2, 0x0A0808, 0.6);
    graphics.strokeRect(hx - 200, hy + 60, 400, 160);
    graphics.strokeRect(hx - 150, hy - 120, 300, 200);

    // ── HP bar above spire ──
    drawHPBar(hx - 200, hy - 400, 400, 12, s.hp, s.maxHp, 0xC8960C);

  } else if (s.structureType === 'barracks') {
    graphics.fillStyle(dark, 0.8); graphics.fillRect(s.x - 35, s.y - 28, 70, 56);
    graphics.fillStyle(primary, 0.75); graphics.fillRect(s.x - 28, s.y - 22, 56, 44);
    graphics.lineStyle(2, isA ? 0x4477dd : 0xdd4444, 0.6);
    graphics.lineBetween(s.x - 35, s.y - 28, s.x, s.y - 38);
    graphics.lineBetween(s.x, s.y - 38, s.x + 35, s.y - 28);
    graphics.fillStyle(0x2a1a08, 0.8); graphics.fillRect(s.x - 8, s.y + 2, 16, 20);
    graphics.lineStyle(1, gold, 0.5); graphics.strokeRect(s.x - 35, s.y - 28, 70, 56);
    drawHPBar(s.x - 28, s.y - 42, 56, 5, s.hp, s.maxHp, primary);

  } else {
    // TOWERS — draw as square tower shapes, NOT circles
    const r = s.tier === 2 ? 28 : 22;
    // Range ring (subtle)
    graphics.lineStyle(1, primary, 0.04);
    graphics.strokeCircle(s.x, s.y, s.tier === 2 ? 350 : 300);
    // Tower body — square with battlements
    graphics.fillStyle(dark, 0.95);
    graphics.fillRect(s.x - r, s.y - r, r * 2, r * 2);
    graphics.fillStyle(primary, 0.8);
    graphics.fillRect(s.x - r + 4, s.y - r + 4, r * 2 - 8, r * 2 - 8);
    // Merlons on top
    for (let bx = -r + 2; bx < r; bx += 10) {
      graphics.fillStyle(dark, 0.9);
      graphics.fillRect(s.x + bx, s.y - r - 6, 6, 8);
    }
    // Gold trim
    graphics.lineStyle(1.5, gold, 0.5);
    graphics.strokeRect(s.x - r, s.y - r, r * 2, r * 2);
    // Tier indicator
    if (s.tier === 2) {
      graphics.fillStyle(gold, 0.4);
      graphics.fillCircle(s.x, s.y, 5);
    }
    drawHPBar(s.x - r, s.y - r - 14, r * 2, 4, s.hp, s.maxHp, primary);
  }
}

function drawHPBar(x, y, w, h, hp, maxHp, color) {
  const pct = Math.max(0, hp / maxHp);
  graphics.fillStyle(0x0D1520, 0.85); graphics.fillRect(x - 1, y - 1, w + 2, h + 2);
  graphics.fillStyle(color, 0.9); graphics.fillRect(x, y, w * pct, h);
  if (pct < 0.3) { graphics.fillStyle(0xff0000, 0.3); graphics.fillRect(x, y, w * pct, h); }
}

// ─── UI Updates ──────────────────────────────────────────────────

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}

function updateUI() {
  if (!gameState) return;
  const gs = gameState;

  // Live tab title
  const aK = gs.heroes.filter(h=>h.faction==='alliance').reduce((s,h)=>s+h.kills,0);
  const hK = gs.heroes.filter(h=>h.faction==='horde').reduce((s,h)=>s+h.kills,0);
  document.title = gs.winner ? `VICTORY - War of Agents` : `[${aK}-${hK}] War of Agents`;

  // Kill announcements + event ticker + structure events
  checkKillAnnouncements(gs);
  updateEventTicker(gs);

  // Tower/base destroyed announcements
  if (!window._prevStructures) window._prevStructures = {};
  for (const s of gs.structures) {
    const wasAlive = window._prevStructures[s.id];
    if (wasAlive === true && !s.alive) {
      const ticker = document.getElementById('event-ticker');
      const ev = document.createElement('div');
      ev.className = 'ticker-event';
      const fColor = s.faction === 'alliance' ? '#4A8FE0' : '#E24B4A';
      const name = s.structureType === 'base' ? 'BASE' : s.structureType.toUpperCase().replace('_', ' ');
      ev.innerHTML = `<span style="color:${fColor}">${s.faction.toUpperCase()}</span> <span style="color:#C8960C">${name} DESTROYED</span>`;
      ticker.appendChild(ev);
      setTimeout(() => { if (ev.parentNode) ev.remove(); }, 6000);
      // Big announce for base
      if (s.structureType === 'base') {
        const container = document.getElementById('kill-announce');
        container.innerHTML = `<div class="announce-text streak7">${s.faction === 'alliance' ? 'ALLIANCE' : 'HORDE'} BASE DESTROYED</div>`;
        setTimeout(() => { container.innerHTML = ''; }, 4000);
      }
    }
    window._prevStructures[s.id] = s.alive;
  }

  // Top bar scores
  const aKills = gs.heroes.filter(h=>h.faction==='alliance').reduce((s,h)=>s+h.kills,0);
  const hKills = gs.heroes.filter(h=>h.faction==='horde').reduce((s,h)=>s+h.kills,0);
  const aAlive = gs.heroes.filter(h=>h.faction==='alliance'&&h.alive).length;
  const hAlive = gs.heroes.filter(h=>h.faction==='horde'&&h.alive).length;
  const aDots = gs.heroes.filter(h=>h.faction==='alliance').map(h=>`<span style="color:${h.alive?'#4A8FE0':'#333'}">\u25CF</span>`).join('');
  const hDots = gs.heroes.filter(h=>h.faction==='horde').map(h=>`<span style="color:${h.alive?'#E24B4A':'#333'}">\u25CF</span>`).join('');
  document.getElementById('alliance-score').innerHTML = `${aDots} ALLIANCE: ${aKills}`;
  document.getElementById('horde-score').innerHTML = `HORDE: ${hKills} ${hDots}`;
  document.getElementById('wave-count').textContent = gs.waveCount;

  // Phase
  const phaseBadge = document.getElementById('phase-badge');
  phaseBadge.textContent = gs.phase.toUpperCase();
  phaseBadge.className = `phase-badge phase-${gs.phase}`;
  document.getElementById('phase-icon').innerHTML = gs.phase === 'day' ? '&#9788;' : '&#9790;';

  // Match timer
  const timeStr = formatTime(gs.time);
  document.getElementById('match-timer').textContent = timeStr;

  // Stats panel
  const aUnits = gs.units.filter(u=>u.alive&&u.faction==='alliance').length;
  const hUnits = gs.units.filter(u=>u.alive&&u.faction==='horde').length;
  document.getElementById('st-wave').textContent = gs.waveCount;
  document.getElementById('st-a-units').textContent = aUnits;
  document.getElementById('st-h-units').textContent = hUnits;
  document.getElementById('st-a-kills').textContent = aKills;
  document.getElementById('st-h-kills').textContent = hKills;
  document.getElementById('st-time').textContent = timeStr;

  // Hero cards
  const panel = document.getElementById('heroes-panel');
  panel.innerHTML = '';

  const sorted = [...gs.heroes].sort((a,b) => {
    if (a.faction !== b.faction) return a.faction==='alliance'?-1:1;
    return b.kills - a.kills;
  });

  for (const h of sorted) {
    const card = document.createElement('div');
    card.className = `hero-card ${h.faction} ${h.alive?'':'dead'}`;
    const streak = h.killStreak>=3 ? `<span class="streak-badge">${h.killStreak}x</span>` : '';
    const icon = CLASS_ICONS[h.heroClass]||'';
    const clr = CLASS_CARD_COLORS[h.heroClass]||'#aaa';
    const hpPct = h.alive?(h.hp/h.maxHp*100):0;
    const manaPct = h.alive?(h.mana/h.maxMana*100):0;
    const agentLabel = h.agentId ? h.agentId : 'AI';
    const pills = h.items.length>0
      ? h.items.map(i=>`<span class="item-pill">${i}</span>`).join('')
      : '<span style="color:#1a2a3a;font-size:8px">No items</span>';
    const abs = h.abilities.map(a=>
      `<span style="color:${a.cd>0?'#1a2a3a':'#3A5A7A'}" title="${a.name} T${a.tier}">${a.name.split(' ')[0]}</span>`
    ).join(' ');

    const hpNum = Math.round(hpPct);
    const mpNum = Math.round(manaPct);
    card.innerHTML = `
      <div class="hero-header">
        <div class="class-icon" style="background:${clr}18;border:1px solid ${clr}66">${icon}</div>
        <div>
          <div class="name">${h.heroClass} ${streak}</div>
          <div class="agent-label">${agentLabel} <span class="level-badge">LV ${h.level}</span></div>
          <div class="faction-label ${h.faction}">${h.faction==='alliance'?'Alliance':'Horde'}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:3px"><span style="color:#C8960C;font-size:8px;min-width:14px">HP</span><div class="hp-bar" style="flex:1"><div class="hp-bar-fill hp-${h.faction}" style="width:${hpPct}%"></div></div><span style="color:#66BB6A;font-size:9px;min-width:28px;text-align:right">${hpNum}%</span></div>
      <div style="display:flex;align-items:center;gap:3px"><span style="color:#C8960C;font-size:8px;min-width:14px">MP</span><div class="hp-bar" style="flex:1"><div class="mana-bar-fill" style="width:${manaPct}%"></div></div><span style="color:#42A5F5;font-size:9px;min-width:28px;text-align:right">${mpNum}%</span></div>
      <div class="kda">K: ${h.kills} / D: ${h.deaths} / A: ${h.assists}</div>
      <div class="stats">${h.hp}/${h.maxHp} HP | ${h.gold}g | DMG:${h.damage}</div>
      <div class="items-row">${pills}</div>
      ${!h.alive?`<div style="color:#E24B4A;font-size:10px;font-weight:700">\u2620 DEAD (${h.respawnIn})</div>`:''}
    `;
    panel.appendChild(card);
  }

  // Kill feed — show last 10 kills
  // Reset kill counter if game was reset or on first load
  if (gs.kills.length < lastKillCount || lastKillCount === 0) {
    lastKillCount = Math.max(0, gs.kills.length - 10); // show last 10 on first load
  }

  if (gs.kills.length > lastKillCount) {
    const feed = document.getElementById('kill-feed');
    for (let i = lastKillCount; i < gs.kills.length; i++) {
      const k = gs.kills[i];
      const killer = gs.heroes.find(h=>h.id===k.killerId);
      const victim = gs.heroes.find(h=>h.id===k.victimId);
      if (!killer||!victim) continue;

      const kClr = killer.faction==='alliance' ? '#4A8FE0' : '#E24B4A';
      const vClr = victim.faction==='alliance' ? '#4A8FE0' : '#E24B4A';
      const kIcon = CLASS_ICONS[killer.heroClass]||'';
      const vIcon = CLASS_ICONS[victim.heroClass]||'';
      const rowCls = killer.faction==='alliance' ? 'alliance-kill' : 'horde-kill';

      const entry = document.createElement('div');
      entry.className = `kill-entry ${k.isRampage?'rampage':rowCls}`;
      entry.innerHTML = k.isRampage
        ? `<span style="color:#ffd700;font-weight:700">RAMPAGE!</span> <span style="color:${kClr}">${kIcon} ${killer.heroClass}</span> <span class="kill-sword">\u2694</span> <span style="color:${vClr}">${vIcon} ${victim.heroClass}</span> <span class="dmg-num">+${k.bounty}g</span>`
        : `<span style="color:${kClr}">${kIcon} ${killer.heroClass}</span> <span class="kill-sword">\u2694</span> <span style="color:${vClr}">${vIcon} ${victim.heroClass}</span> <span class="dmg-num">+${k.bounty}g</span>`;

      feed.appendChild(entry);

      // Sound effects
      if (k.isRampage) sfxRampage(); else sfxKill();

      // Auto-fade after 30 seconds (keep visible much longer)
      setTimeout(() => { entry.classList.add('fading'); }, 30000);
      setTimeout(() => { if (entry.parentNode) entry.remove(); }, 31000);

      // Keep max 10
      const entries = feed.querySelectorAll('.kill-entry');
      while (entries.length > 10) entries[0].remove();
    }
    lastKillCount = gs.kills.length;
  }

  // Minimap
  const mc = document.getElementById('minimap-canvas');
  const ctx = mc.getContext('2d');
  if (mc.width !== 160) { mc.width = 160; mc.height = 160; }
  // Background
  ctx.fillStyle = '#0a0e08';
  ctx.fillRect(0, 0, 160, 160);

  const sx = 160/MAP_W, sy = 160/MAP_H;

  // Territory tint
  ctx.fillStyle = '#0c1a0c';
  ctx.fillRect(0, 0, 80, 160);
  ctx.fillStyle = '#1a100a';
  ctx.fillRect(80, 0, 80, 160);

  // Mid lane on minimap
  ctx.fillStyle = '#3A2A18';
  ctx.fillRect(0, 1040 * sy, 80, 320 * sy);
  ctx.fillStyle = '#2A1500';
  ctx.fillRect(80, 1040 * sy, 80, 320 * sy);

  // Jungle camps on minimap
  if (gs.camps) {
    for (const camp of gs.camps) {
      const alive = camp.monsters && camp.monsters.some(m => m.alive);
      ctx.fillStyle = alive ? (camp.isBoss ? '#CC8800' : '#4A6A2A') : '#1A1A0A';
      ctx.beginPath();
      ctx.arc(camp.x * sx, camp.y * sy, alive ? 3 : 1, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Gold divider / river
  ctx.fillStyle = '#2A5080';
  ctx.fillRect(79, 0, 2, 160);
  ctx.fillStyle = '#C8960C';
  ctx.fillRect(79.5, 0, 1, 160);

  // Structures
  for (const s of gs.structures) {
    if (!s.alive) continue;
    ctx.fillStyle = s.faction==='alliance' ? '#3366cc' : '#cc3333';
    if (s.structureType==='base') {
      ctx.fillRect(s.x*sx-4, s.y*sy-4, 8, 8);
      ctx.strokeStyle = '#C8960C'; ctx.lineWidth = 1;
      ctx.strokeRect(s.x*sx-4, s.y*sy-4, 8, 8);
    } else if (s.structureType==='barracks') {
      ctx.fillRect(s.x*sx-2, s.y*sy-2, 4, 4);
    } else {
      ctx.beginPath(); ctx.arc(s.x*sx, s.y*sy, s.tier===2?3:2, 0, Math.PI*2); ctx.fill();
    }
  }

  // Units as dots
  for (const u of gs.units) {
    if (!u.alive) continue;
    ctx.fillStyle = u.faction==='alliance' ? '#4A8FE0' : '#E24B4A';
    ctx.globalAlpha = 0.6;
    ctx.fillRect(u.x*sx-2, u.y*sy-2, 4, 4);
  }
  ctx.globalAlpha = 1;

  // Heroes as larger dots
  for (const h of gs.heroes) {
    if (!h.alive) continue;
    ctx.fillStyle = h.faction==='alliance' ? '#4A8FE0' : '#E24B4A';
    ctx.beginPath(); ctx.arc(h.x*sx, h.y*sy, 5, 0, Math.PI*2); ctx.fill();
    // White center dot
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(h.x*sx, h.y*sy, 1, 0, Math.PI*2); ctx.fill();
  }

  // Camera viewport
  if (cam) {
    ctx.strokeStyle = '#C8960C88';
    ctx.lineWidth = 1;
    ctx.strokeRect(cam.scrollX*sx, cam.scrollY*sy, (cam.width/cam.zoom)*sx, (cam.height/cam.zoom)*sy);
  }

  // Winner overlay — full stats screen
  const overlay = document.getElementById('winner-overlay');
  if (gs.winner) {
    overlay.classList.add('show');
    document.getElementById('winner-text').textContent = 'VICTORY';
    document.getElementById('winner-faction').textContent =
      gs.winner==='alliance' ? 'THE ALLIANCE TRIUMPHS' : 'THE IRON HORDE CONQUERS';
    document.getElementById('winner-faction').style.color =
      gs.winner==='alliance' ? '#4A8FE0' : '#E24B4A';

    // Build MVP stats table (only once)
    if (!document.getElementById('mvp-stats')) {
      const mvp = [...gs.heroes].sort((a,b) => (b.kills*3+b.assists) - (a.kills*3+a.assists))[0];
      const statsDiv = document.createElement('div');
      statsDiv.id = 'mvp-stats';
      statsDiv.style.cssText = 'margin-top:20px;max-width:700px;width:90%;';

      // MVP banner
      const mvpColor = mvp.faction==='alliance' ? '#4A8FE0' : '#E24B4A';
      let html = `<div style="text-align:center;margin-bottom:12px">
        <span style="color:#C8960C;font-size:14px;letter-spacing:0.1em">MOST VALUABLE PLAYER</span><br>
        <span style="color:${mvpColor};font-size:22px;font-weight:700;text-shadow:0 0 10px ${mvpColor}44">${mvp.heroClass.toUpperCase()}</span>
        <span style="color:#C8960C;font-size:14px"> — K:${mvp.kills} D:${mvp.deaths} A:${mvp.assists}</span>
      </div>`;

      // Match time
      html += `<div style="text-align:center;color:#888;font-size:12px;margin-bottom:10px">Match Time: ${formatTime(gs.time)} | Wave: ${gs.waveCount}</div>`;

      // Hero table
      html += `<table style="width:100%;border-collapse:collapse;font-size:11px">
        <tr style="color:#C8960C;border-bottom:1px solid #C8960C44">
          <th style="padding:4px 6px;text-align:left">Hero</th><th>Faction</th><th>K</th><th>D</th><th>A</th><th>Gold</th><th>Level</th><th>Items</th>
        </tr>`;
      const sorted2 = [...gs.heroes].sort((a,b) => b.kills - a.kills);
      for (const h of sorted2) {
        const fc = h.faction==='alliance' ? '#4A8FE0' : '#E24B4A';
        const bg = h.id === mvp.id ? '#C8960C11' : 'transparent';
        html += `<tr style="border-bottom:1px solid #ffffff08;background:${bg}">
          <td style="padding:3px 6px;color:${fc};font-weight:700">${h.heroClass}</td>
          <td style="color:${fc};text-align:center">${h.faction}</td>
          <td style="text-align:center;color:#66CC66">${h.kills}</td>
          <td style="text-align:center;color:#CC6666">${h.deaths}</td>
          <td style="text-align:center;color:#6688AA">${h.assists}</td>
          <td style="text-align:center;color:#F0C040">${h.gold}</td>
          <td style="text-align:center;color:#C8960C">${h.level}</td>
          <td style="color:#8A7A5A;font-size:9px">${h.items.join(', ')||'—'}</td>
        </tr>`;
      }
      html += '</table>';
      html += `<div style="text-align:center;margin-top:14px"><button onclick="fetch('/api/admin/reset',{method:'POST'}).then(()=>location.reload())" style="background:linear-gradient(135deg,#8B6914,#C8960C);color:#1A0E04;border:none;padding:8px 24px;font-family:Cinzel;font-size:13px;font-weight:700;border-radius:4px;cursor:pointer;letter-spacing:0.08em">PLAY AGAIN</button></div>`;

      statsDiv.innerHTML = html;
      overlay.appendChild(statsDiv);
    }
  } else {
    overlay.classList.remove('show');
    const old = document.getElementById('mvp-stats');
    if (old) old.remove();
  }
}

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight - TOP_H - BOT_H;
  game.scale.resize(w, h);
  if (cam) {
    cam.setZoom(w / 4800);
    cam.centerOn(2400, 1200);
  }
});
</script>
