<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="War of Agents — AI Agent MOBA Arena. Alliance vs Iron Horde.">
<meta name="theme-color" content="#C8960C">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<title>War of Agents — Alliance vs Iron Horde</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { overflow: hidden !important; }
  body {
    background: #050a14;
    color: #d4c08a;
    font-family: 'Cinzel', serif;
    overflow: hidden !important;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── TOP BAR ──────────────────────────────────────── */
  #top-bar {
    height: 42px;
    background: linear-gradient(180deg, #12100A, #0A0804);
    border-bottom: 2px solid;
    border-image: linear-gradient(90deg, #5A4A2A, #C8960C, #F0C040, #C8960C, #5A4A2A) 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 10;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  #top-bar .title {
    font-size: 15px;
    font-weight: 900;
    color: #C8960C;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(200,150,12,0.4), 0 1px 2px rgba(0,0,0,0.5);
    min-width: 180px;
  }

  .score-display {
    display: flex;
    gap: 16px;
    align-items: center;
    font-size: 14px;
    font-weight: 700;
  }

  .score-alliance { color: #4A8FE0; }
  .score-horde { color: #E24B4A; }
  .score-sep { color: #C8960C33; font-size: 16px; }
  .score-wave { color: #C8960C; font-size: 12px; }

  .phase-info {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 180px;
    justify-content: flex-end;
  }

  .phase-icon { font-size: 16px; }
  .phase-badge {
    padding: 2px 10px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .phase-day { background: #1a1808; color: #C8960C; border: 1px solid #C8960C44; }
  .phase-night { background: #0a1020; color: #6688cc; border: 1px solid #334488; }
  .match-timer { color: #666; font-size: 11px; font-weight: 400; }

  /* ─── MAIN AREA ────────────────────────────────────── */
  #main-area {
    flex: 1;
    display: flex;
    position: relative;
    overflow: hidden;
  }

  #game-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #game-container canvas { display: block; }

  /* ─── COMBAT LOG (top right overlay) ────────────────── */
  #kill-feed {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 320px;
    z-index: 20;
    pointer-events: none;
    background: #050E1Acc;
    border-left: 3px solid #C8960C;
    border-radius: 0 0 0 4px;
    padding: 4px 0;
  }

  #kill-feed-header {
    color: #C8960C;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
    padding: 2px 10px;
    opacity: 0.8;
  }

  .kill-entry {
    border: none;
    border-radius: 0;
    padding: 5px 10px;
    margin-bottom: 0;
    font-size: 11px;
    animation: fadeIn 0.3s ease;
    display: flex;
    align-items: center;
    gap: 5px;
    position: relative;
    pointer-events: auto;
    transition: opacity 0.8s ease;
  }
  .kill-entry:nth-child(even) { background: #0A1228; }
  .kill-entry:nth-child(odd) { background: #060E1A; }
  .kill-entry.fading { opacity: 0; }
  .kill-entry.rampage { background: #1A1500; color: #ffd700; border-left: 2px solid #C8960C; }
  .kill-entry .dmg-num { color: #F0C040; font-weight: 700; }
  .kill-entry .kill-sword { color: #C8960C; font-size: 10px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes pulseGold { 0%,100% { text-shadow: 0 0 6px rgba(255,215,0,0.3); } 50% { text-shadow: 0 0 14px rgba(255,215,0,0.8); } }

  /* ═══════════════════════════════════════════════════════
     WARCRAFT-THEMED BOTTOM PANEL
     ═══════════════════════════════════════════════════════ */

  /* ─── BOTTOM PANEL — dark stone slab with gold trim ─── */
  #bottom-panel {
    height: 190px;
    background: linear-gradient(180deg, #0E0A06 0%, #1A1208 40%, #0A0804 100%);
    border-top: 3px solid;
    border-image: linear-gradient(90deg, #8B6914, #F0C040, #C8960C, #F0C040, #8B6914) 1;
    display: flex;
    flex-shrink: 0;
    z-index: 10;
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
  }

  /* ─── MINIMAP — stone-framed scrying orb ─────────────── */
  #minimap-panel {
    width: 180px;
    padding: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-right: 1px solid #5A4A2A;
    flex-shrink: 0;
    background: linear-gradient(180deg, #0E0A04, #1A1208);
  }

  #minimap-label {
    font-size: 10px;
    color: #C8960C;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 4px;
    text-shadow: 0 0 4px rgba(200,150,12,0.4);
  }

  #minimap-wrap {
    width: 160px;
    height: 160px;
    border: 2px solid #8B6914;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 12px rgba(200,150,12,0.25), inset 0 0 6px rgba(0,0,0,0.5);
    background: #050804;
  }

  #minimap-wrap canvas { width: 100%; height: 100%; display: block; }

  /* ─── HERO CARDS — ornate parchment frames ───────────── */
  #heroes-panel {
    flex: 1;
    display: flex;
    gap: 5px;
    padding: 6px 8px;
    overflow-x: auto;
    align-items: flex-start;
  }

  .hero-card {
    min-width: 152px;
    background: linear-gradient(170deg, #1A1408 0%, #0E0A04 50%, #12100A 100%);
    border: 1px solid #5A4A2A;
    border-radius: 6px;
    padding: 8px;
    font-size: 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
    box-shadow: inset 0 1px 0 rgba(200,150,12,0.08), 0 2px 6px rgba(0,0,0,0.4);
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .hero-card:hover {
    box-shadow: inset 0 1px 0 rgba(200,150,12,0.15), 0 0 14px rgba(200,150,12,0.15), 0 3px 8px rgba(0,0,0,0.5);
    border-color: #C8960C;
  }
  .hero-card.alliance {
    border-color: #4A6A8A;
    border-left: 3px solid #4A8FE0;
    box-shadow: inset 0 1px 0 rgba(74,143,224,0.06), 0 2px 6px rgba(0,0,0,0.4);
  }
  .hero-card.alliance:hover { border-color: #4A8FE0; box-shadow: 0 0 12px rgba(74,143,224,0.15); }
  .hero-card.horde {
    border-color: #5A2A1A;
    border-left: 3px solid #CC3322;
    box-shadow: inset 0 1px 0 rgba(204,51,34,0.06), 0 2px 6px rgba(0,0,0,0.4);
  }
  .hero-card.horde:hover { border-color: #CC3322; box-shadow: 0 0 12px rgba(204,51,34,0.15); }
  .hero-card.dead { border-color: #2A2A2A; opacity: 1; }
  .hero-card::after {
    content: '';
    position: absolute;
    right: -4px;
    top: 10%;
    height: 80%;
    width: 1px;
    background: linear-gradient(180deg, transparent, #C8960C66, transparent);
  }
  .hero-card { position: relative; }

  .hero-card .hero-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 3px;
  }

  .hero-card .class-icon {
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    border-radius: 4px;
    flex-shrink: 0;
    box-shadow: 0 0 4px rgba(200,150,12,0.2);
  }

  .hero-card .name {
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .hero-card.alliance .name { color: #F0C040; text-shadow: 0 0 6px rgba(240,192,64,0.25); }
  .hero-card.horde .name { color: #E24B4A; text-shadow: 0 0 6px rgba(226,75,74,0.25); }

  .hero-card .agent-label {
    font-size: 9px;
    color: #8A7A5A;
    font-weight: 400;
    letter-spacing: 0.04em;
  }

  .hero-card .faction-label { font-size: 10px; font-weight: 500; }
  .hero-card .faction-label.alliance { color: #4A8FE0; }
  .hero-card .faction-label.horde { color: #E24B4A; }

  .hero-card .level-badge {
    display: inline-block;
    border-radius: 3px;
    padding: 0 5px;
    font-size: 9px;
    font-weight: 700;
    margin-left: 4px;
    color: #F0C040;
    text-shadow: 0 0 3px rgba(240,192,64,0.3);
  }
  .hero-card.alliance .level-badge { background: #0A1A2A; border: 1px solid #4A8FE033; }
  .hero-card.horde .level-badge { background: #1A0808; border: 1px solid #E24B4A33; }

  .hero-card .stats { color: #8A7A5A; line-height: 1.4; font-size: 10px; }
  .hero-card .kda { color: #AAA080; font-weight: 700; font-size: 11px; }
  .hero-card .items-row { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 2px; }
  .hero-card .item-pill {
    background: linear-gradient(135deg, #1A1400, #2A1E08);
    color: #C8960C;
    border: 1px solid #5A4A2A;
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    white-space: nowrap;
    box-shadow: inset 0 1px 0 rgba(200,150,12,0.08);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .hero-card .item-pill:hover {
    border-color: #C8960C;
    box-shadow: 0 0 6px rgba(200,150,12,0.2);
  }
  .hero-card .abilities-row { color: #5A4A3A; font-size: 8px; margin-top: 1px; }

  .hp-bar {
    width: 100%;
    height: 6px;
    background: #0A0804;
    border-radius: 3px;
    overflow: hidden;
    margin: 2px 0;
    border: 1px solid #2A2218;
  }
  .hp-bar-fill { height: 100%; border-radius: 2px; transition: width 0.1s; }
  .hp-alliance { background: linear-gradient(90deg, #1A6A1A, #44AA44, #66CC66); box-shadow: 0 0 4px rgba(68,170,68,0.3); }
  .hp-horde { background: linear-gradient(90deg, #1A6A1A, #44AA44, #66CC66); box-shadow: 0 0 4px rgba(68,170,68,0.3); }
  .mana-bar-fill { height: 100%; background: linear-gradient(90deg, #0A3A8A, #2266CC, #4488EE); border-radius: 2px; transition: width 0.1s; box-shadow: 0 0 4px rgba(34,102,204,0.3); }

  .streak-badge {
    display: inline-block;
    background: linear-gradient(135deg, #8B6914, #FFD700, #C8960C);
    color: #1A0E04;
    padding: 0 6px;
    border-radius: 3px;
    font-size: 9px;
    font-weight: 700;
    margin-left: 3px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.2);
    box-shadow: 0 0 6px rgba(255,215,0,0.3);
  }

  /* ─── STATS PANEL — iron-bound ledger ──────────────── */
  #stats-panel {
    width: 160px;
    padding: 8px 10px;
    border-left: 1px solid #5A4A2A;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
    font-size: 10px;
    background: linear-gradient(180deg, #0E0A04, #1A1208);
  }

  #stats-label {
    font-size: 10px;
    color: #C8960C;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 2px;
    text-shadow: 0 0 4px rgba(200,150,12,0.4);
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    padding: 3px 5px;
    border-radius: 2px;
  }
  .stat-row:nth-child(odd) { background: rgba(200,150,12,0.03); }
  .stat-row:nth-child(even) { background: transparent; }

  .stat-row .stat-label { color: #8A7A5A; font-size: 11px; }
  .stat-row .stat-val { font-weight: 700; font-size: 14px; }
  .stat-row .stat-val.blue { color: #4A8FE0; font-size: 14px; text-shadow: 0 0 4px rgba(74,143,224,0.2); }
  .stat-row .stat-val.red { color: #E24B4A; font-size: 14px; text-shadow: 0 0 4px rgba(226,75,74,0.2); }
  .stat-row .stat-val.gold { color: #F0C040; font-size: 20px; font-weight: 900; text-shadow: 0 0 8px rgba(240,192,64,0.4); }
  .stat-row .stat-val.silver { color: #CCCCCC; font-size: 14px; }

  .stats-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #5A4A2A, transparent);
    margin: 2px 0;
  }

  /* ─── SPECTATOR CHAT ────────────────────────────────── */
  #chat-panel {
    position: fixed;
    bottom: 200px;
    left: 8px;
    width: 240px;
    background: #0A0804ee;
    border: 1px solid #5A4A2A;
    border-radius: 6px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  #chat-header {
    font-size: 9px; color: #C8960C; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 4px 8px; border-bottom: 1px solid #5A4A2A44; cursor: pointer; user-select: none;
  }
  #chat-header:hover { color: #F0C040; }
  #chat-panel.collapsed #chat-messages,
  #chat-panel.collapsed #chat-input-row { display: none; }
  #chat-messages {
    height: 140px; overflow-y: auto; padding: 4px 8px; font-size: 11px; color: #AAA080;
  }
  #chat-messages div { margin-bottom: 3px; line-height: 1.3; }
  #chat-messages .chat-name { color: #C8960C; font-weight: 700; }
  #chat-input-row { display: flex; border-top: 1px solid #5A4A2A44; }
  #chat-input {
    flex: 1; background: #0A0804; border: none; color: #d4c08a; padding: 5px 8px;
    font-family: 'Cinzel', serif; font-size: 11px; outline: none;
  }
  #chat-send {
    background: linear-gradient(135deg, #5A4A2A, #8B6914); color: #F0C040; border: none;
    padding: 5px 10px; font-family: 'Cinzel', serif; font-size: 10px; cursor: pointer;
    font-weight: 700; letter-spacing: 0.05em;
  }
  #chat-send:hover { background: linear-gradient(135deg, #8B6914, #C8960C); }

  /* ─── MOBILE RESPONSIVE ─────────────────────────────── */
  @media (max-width: 768px) {
    #top-bar { height: 32px; padding: 0 8px; }
    #top-bar .title { font-size: 11px; min-width: auto; }
    .score-display { font-size: 11px; gap: 8px; }
    .phase-info { min-width: auto; gap: 6px; }
    .match-timer { font-size: 9px; }
    .phase-badge { font-size: 8px; padding: 1px 6px; }

    #bottom-panel { height: 160px; }
    #minimap-panel { width: 120px; padding: 4px; }
    #minimap-wrap { width: 108px; height: 108px; }
    #minimap-label { font-size: 8px; }

    .hero-card { min-width: 120px; padding: 5px; font-size: 9px; }
    .hero-card .name { font-size: 11px; }
    .hero-card .class-icon { width: 20px; height: 20px; font-size: 12px; }

    #stats-panel { width: 110px; padding: 4px 6px; }
    #stats-label { font-size: 8px; }
    .stat-row { font-size: 9px; }
    .stat-row .stat-val.gold { font-size: 14px; }

    #kill-feed { width: 220px; }
    .kill-entry { font-size: 9px; padding: 3px 6px; }

    #chat-panel { width: 180px; bottom: 170px; }
    #chat-messages { height: 100px; font-size: 10px; }
  }

  @media (max-width: 480px) {
    #minimap-panel { display: none; }
    #stats-panel { display: none; }
    #bottom-panel { height: 130px; }
    .hero-card { min-width: 100px; }
    .hero-card .items-row { display: none; }
    .hero-card .abilities-row { display: none; }
    #kill-feed { width: 180px; }
    #chat-panel { width: 160px; bottom: 140px; }
  }

  /* Touch-friendly tap targets */
  @media (pointer: coarse) {
    #chat-input { font-size: 16px; padding: 8px; }
    #chat-send { padding: 8px 14px; }
  }

  /* ─── WINNER OVERLAY ───────────────────────────────── */
  #winner-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #winner-overlay.show { display: flex; }
  #winner-overlay h1 {
    font-size: 52px;
    text-shadow: 0 0 40px rgba(255,215,0,0.8);
    color: #ffd700;
    margin-bottom: 10px;
    animation: pulseGold 2s infinite;
  }
  #winner-overlay h2 { font-size: 24px; color: #d4c08a; }
  /* ─── KILL ANNOUNCEMENTS ────────────────────────────── */
  #kill-announce {
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 90;
    pointer-events: none;
    text-align: center;
  }
  .announce-text {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: announceIn 0.3s ease, announceOut 0.5s ease 2s forwards;
    text-shadow: 0 0 20px rgba(255,215,0,0.6), 0 2px 4px rgba(0,0,0,0.8);
    margin-bottom: 4px;
  }
  .announce-text.streak3 { color: #F0C040; }
  .announce-text.streak5 { color: #FF6600; font-size: 42px; }
  .announce-text.streak7 { color: #FF2222; font-size: 48px; }
  .announce-text.streak10 { color: #FF00FF; font-size: 54px; }
  .announce-sub { color: #AAA080; font-size: 14px; letter-spacing: 0.1em; animation: announceIn 0.3s ease, announceOut 0.5s ease 2s forwards; }
  @keyframes announceIn { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
  @keyframes announceOut { from { opacity: 1; } to { opacity: 0; transform: scale(1.2); } }

  /* ─── LOADING SCREEN ───────────────────────────────── */
  #loading-screen {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(180deg, #0A0804, #1A1208, #0A0804);
    z-index: 200;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.8s ease;
  }
  #loading-screen.hidden { opacity: 0; pointer-events: none; }
  #loading-title {
    font-size: 42px;
    color: #C8960C;
    text-shadow: 0 0 30px rgba(200,150,12,0.5);
    letter-spacing: 0.2em;
    margin-bottom: 8px;
  }
  #loading-subtitle {
    font-size: 14px;
    color: #8A7A5A;
    letter-spacing: 0.15em;
    margin-bottom: 30px;
  }
  #loading-bar-bg {
    width: 300px;
    height: 6px;
    background: #1A1208;
    border: 1px solid #5A4A2A;
    border-radius: 3px;
    overflow: hidden;
  }
  #loading-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #8B6914, #C8960C, #F0C040);
    border-radius: 3px;
    transition: width 0.3s;
  }
  #loading-tip {
    margin-top: 16px;
    color: #5A4A2A;
    font-size: 11px;
    font-style: italic;
    letter-spacing: 0.05em;
  }

  /* ─── GAME EVENT TICKER (top center) ───────────────── */
  #event-ticker {
    position: fixed;
    top: 44px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .ticker-event {
    background: #0A0804cc;
    border: 1px solid #5A4A2A55;
    border-radius: 3px;
    padding: 2px 12px;
    font-size: 11px;
    color: #AAA080;
    animation: fadeIn 0.3s ease, announceOut 0.5s ease 4s forwards;
    white-space: nowrap;
  }
</style>
</head>
<body>

<!-- ─── LOADING SCREEN ────────────────────────────────── -->
<div id="loading-screen">
  <div id="loading-title">WAR OF AGENTS</div>
  <div id="loading-subtitle">ALLIANCE VS IRON HORDE</div>
  <div id="loading-bar-bg"><div id="loading-bar-fill"></div></div>
  <div id="loading-tip">Preparing the battlefield...</div>
</div>

<!-- ─── KILL ANNOUNCEMENTS ────────────────────────────── -->
<div id="kill-announce"></div>

<!-- ─── EVENT TICKER ──────────────────────────────────── -->
<div id="event-ticker"></div>

<!-- ─── TOP BAR ──────────────────────────────────────── -->
<div id="top-bar">

<script>
// ═══════════════════════════════════════════════════════════════
// WAR OF AGENTS — Phaser 3 Sprite-Based Renderer
// ═══════════════════════════════════════════════════════════════
const MAP_W = 4800, MAP_H = 2400;
const TOP_H = 40, BOT_H = 190;
let gameState = null;
let lastKillCount = 0;
let deathEffects = [];
let levelUpEffects = [];
let phaserScene = null;

// ─── Class visual config ─────────────────────────────────────────
const CLASS_CFG = {

const CLASS_ICONS = {

};

const CLASS_CARD_COLORS = {
  knight: '#4A8FE0', ranger: '#4a4', mage: '#a4f', priest: '#dd4', siegemaster: '#d84',
};

// ─── WebSocket ───────────────────────────────────────────────────
const ws = new WebSocket(`ws://${location.host}`);
// ─── Loading Screen ──────────────────────────────────────────
const loadingTips = [
  'Sharpening Alliance swords...',
  'Feeding the Horde war beasts...',
  'Polishing the gold divider...',
  'Summoning hero spirits...',
  'Fortifying tower defenses...',
  'Brewing mana potions...',
  'The Lich King watches...',
];
document.getElementById('loading-tip').textContent = loadingTips[Math.floor(Math.random() * loadingTips.length)];
let loadProg = 0;
const loadInterval = setInterval(() => {
  loadProg += 8 + Math.random() * 12;
  if (loadProg > 100) loadProg = 100;
  document.getElementById('loading-bar-fill').style.width = loadProg + '%';

}, 200);

// ─── Kill Announcements ─────────────────────────────────────
let _lastAnnounceKills = {};
let _firstBloodShown = false;
function checkKillAnnouncements(gs) {
  // First blood
  if (!_firstBloodShown && gs.kills.length > 0) {
    _firstBloodShown = true;
    const k = gs.kills[0];
    const killer = gs.heroes.find(h => h.id === k.killerId);
    if (killer) {
      const container = document.getElementById('kill-announce');
      const fColor = killer.faction === 'alliance' ? '#4A8FE0' : '#E24B4A';
      container.innerHTML = `
        <div class="announce-text streak5" style="color:#CC0000">FIRST BLOOD</div>
        <div class="announce-sub"><span style="color:${fColor}">${killer.heroClass.toUpperCase()}</span> draws first blood!</div>
      `;
      setTimeout(() => { container.innerHTML = ''; }, 3000);
    }
  }
  // Reset on game reset
  if (gs.kills.length === 0) _firstBloodShown = false;

  // Kill streaks
  for (const h of gs.heroes) {
    const prev = _lastAnnounceKills[h.id] || 0;
    if (h.killStreak > prev && h.killStreak >= 3) {
      showKillAnnounce(h);
    }
    _lastAnnounceKills[h.id] = h.killStreak;
  }
}

function showKillAnnounce(hero) {
  const container = document.getElementById('kill-announce');
  const streakNames = { 3:'KILLING SPREE', 4:'DOMINATING', 5:'MEGA KILL', 6:'UNSTOPPABLE', 7:'WICKED SICK', 8:'MONSTER KILL', 9:'GODLIKE', 10:'BEYOND GODLIKE' };
  const name = streakNames[Math.min(hero.killStreak, 10)] || 'RAMPAGE';
  const cls = hero.killStreak >= 10 ? 'streak10' : hero.killStreak >= 7 ? 'streak7' : hero.killStreak >= 5 ? 'streak5' : 'streak3';
  const fColor = hero.faction === 'alliance' ? '#4A8FE0' : '#E24B4A';

  container.innerHTML = `
    <div class="announce-text ${cls}">${name}</div>
    <div class="announce-sub"><span style="color:${fColor}">${hero.heroClass.toUpperCase()}</span> is on a ${hero.killStreak}-kill streak!</div>
  `;
  setTimeout(() => { container.innerHTML = ''; }, 3000);
}

// ─── Event Ticker ────────────────────────────────────────────
let _lastTickerKillCount = 0;
function updateEventTicker(gs) {
  if (gs.kills.length <= _lastTickerKillCount) return;
  const ticker = document.getElementById('event-ticker');
  for (let i = _lastTickerKillCount; i < gs.kills.length; i++) {
    const k = gs.kills[i];
    const killer = gs.heroes.find(h => h.id === k.killerId);
    const victim = gs.heroes.find(h => h.id === k.victimId);
    if (!killer || !victim) continue;
    const kC = killer.faction === 'alliance' ? '#4A8FE0' : '#E24B4A';
    const vC = victim.faction === 'alliance' ? '#4A8FE0' : '#E24B4A';
    const ev = document.createElement('div');
    ev.className = 'ticker-event';
    ev.innerHTML = `<span style="color:${kC}">${killer.heroClass}</span> <span style="color:#C8960C">\u2694</span> <span style="color:${vC}">${victim.heroClass}</span>`;
    ticker.appendChild(ev);
    setTimeout(() => { if (ev.parentNode) ev.remove(); }, 5000);
    while (ticker.children.length > 5) ticker.removeChild(ticker.firstChild);
  }
  _lastTickerKillCount = gs.kills.length;
  if (gs.kills.length < _lastTickerKillCount) _lastTickerKillCount = 0;
}

// ─── Chat (collapsible) ──────────────────────────────────────
document.getElementById('chat-header').onclick = () => {
  document.getElementById('chat-panel').classList.toggle('collapsed');
};
const chatName = 'Spectator' + Math.floor(Math.random() * 999);
document.getElementById('chat-send').onclick = () => {
  const inp = document.getElementById('chat-input');
  const txt = inp.value.trim();
  if (txt && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'chat', name: chatName, text: txt }));
    addChatMsg(chatName, txt);
    inp.value = '';
  }
};
document.getElementById('chat-input').onkeydown = (e) => { if (e.key === 'Enter') document.getElementById('chat-send').click(); };
function addChatMsg(name, text) {
  const div = document.getElementById('chat-messages');
  const msg = document.createElement('div');
  msg.innerHTML = `<span class="chat-name">${name}:</span> ${text}`;
  div.appendChild(msg);
  div.scrollTop = div.scrollHeight;
  while (div.children.length > 50) div.removeChild(div.firstChild);
}

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  if (msg.type === 'chat') { addChatMsg(msg.name, msg.text); return; }
  if (msg.type === 'state') {
    const prev = gameState;
    gameState = msg.data;
    if (prev) {
      const prevMap = {};
      for (const h of prev.heroes) prevMap[h.id] = h;
      for (const h of gameState.heroes) {
        if (prevMap[h.id] && prevMap[h.id].alive && !h.alive) {
          deathEffects.push({ x: h.x, y: h.y, color: h.faction === 'alliance' ? 0x4488ff : 0xff4444, age: 0, maxAge: 40 });
          sfxDeath();
        }
        if (prevMap[h.id] && h.level > prevMap[h.id].level) {
          levelUpEffects.push({ x: h.x, y: h.y, age: 0 });
        }
      }
    }
    updateUI();
  }
};
ws.onclose = () => setTimeout(() => location.reload(), 3000);

// ─── Sound Effects (Web Audio API) ───────────────────────────
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
document.addEventListener('click', initAudio, { once: true });

function playTone(freq, dur, vol, type) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type || 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol || 0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start(); osc.stop(audioCtx.currentTime + dur);
}

function sfxAttack() { playTone(200, 0.08, 0.06, 'sawtooth'); }
function sfxKill() { playTone(600, 0.15, 0.1, 'square'); playTone(800, 0.2, 0.08, 'sine'); }
function sfxGold() { playTone(1200, 0.1, 0.05, 'sine'); setTimeout(() => playTone(1500, 0.1, 0.04, 'sine'), 80); }
function sfxDeath() { playTone(100, 0.3, 0.08, 'sawtooth'); }
function sfxRampage() { playTone(400, 0.1, 0.12, 'square'); setTimeout(() => playTone(600, 0.1, 0.1, 'square'), 100); setTimeout(() => playTone(900, 0.2, 0.08, 'square'), 200); }

const game = new Phaser.Game(config);
let cam, graphics;
// Sprite pools keyed by entity id
const spritePool = {};
const hpBarPool = {};
const dmgTexts = []; // floating damage numbers
let terrainDrawn = false;
let terrainGfx, nightOverlay, sunMoonText;
let prevHpMap = {}; // track HP changes for damage numbers

// ─── Generate textures programmatically ─────────────────────────
function pPreload() {
  const scene = this;

  // Helper: draw into a texture
  function genTex(key, w, h, drawFn) {
    const g = scene.make.graphics({ x: 0, y: 0, add: false });
    drawFn(g, w, h);
    g.generateTexture(key, w, h);
    g.destroy();
  }

  // ─── UNIT TEXTURES (52x52) ────────────────────────
  const S = 52;

  // Alliance Knight — blue armored warrior with sword + shield (64x64)
  genTex('a_knight', S, S, (g) => {
    const c = S/2; // center = 32
    g.fillStyle(0x4A7ABF, 1); g.fillRect(c-10, c-12, 20, 26);
    g.fillStyle(0x2A4A7A, 1); g.fillRect(c-16, c-12, 12, 10); g.fillRect(c+4, c-12, 12, 10);
    g.fillStyle(0xBBCCDD, 1); g.fillCircle(c, c-18, 10);
    g.fillStyle(0xDDB88A, 1); g.fillRect(c-5, c-20, 10, 6);
    g.fillStyle(0x2A4A7A, 1); g.fillRect(c-7, c+14, 6, 14); g.fillRect(c+1, c+14, 6, 14);
    g.fillStyle(0x4A7ABF, 1); g.fillRoundedRect(3, c-14, 14, 26, 4);
    g.lineStyle(2, 0xffd700, 0.7); g.strokeRoundedRect(3, c-14, 14, 26, 4);
    g.lineStyle(3, 0xCCCCDD, 1); g.lineBetween(S-12, c-22, S-12, c+10);
    g.lineStyle(2, 0xBB9933, 1); g.lineBetween(S-18, c-4, S-6, c-4);
  });

  // Horde Knight — red orc warrior with battle axe (64x64)
  genTex('h_knight', S, S, (g) => {
    const c = S/2;
    g.fillStyle(0x8B3A2A, 1); g.fillRect(c-10, c-12, 20, 26);
    g.fillStyle(0x5A2218, 1); g.fillRect(c-16, c-12, 12, 10); g.fillRect(c+4, c-12, 12, 10);
    g.fillStyle(0x5A8A3A, 1); g.fillCircle(c, c-18, 12);
    g.fillStyle(0x3A5A2A, 1); g.fillRect(c-5, c-20, 10, 6);
    g.fillStyle(0x5A2218, 1); g.fillRect(c-7, c+14, 6, 14); g.fillRect(c+1, c+14, 6, 14);
    g.lineStyle(4, 0x5A3A1A, 1); g.lineBetween(S-10, c-24, S-10, c+14);
    g.fillStyle(0x888888, 1);
    g.fillTriangle(S-10, c-22, S-18, c-14, S-10, c-6);
    g.fillTriangle(S-10, c-22, S-2, c-14, S-10, c-6);
  });

  // Alliance Ranger — green hooded archer with bow (64x64)
  genTex('a_ranger', S, S, (g) => {
    const c = S/2;
    g.fillStyle(0x2E6030, 1); g.fillTriangle(c, c-8, c-14, c+18, c+14, c+18);
    g.fillStyle(0x1A3A1A, 1); g.fillTriangle(c, c-24, c-12, c-6, c+12, c-6);
    g.fillStyle(0xDDB88A, 1); g.fillCircle(c, c-14, 5);
    g.fillStyle(0x1A3A1A, 1); g.fillRect(c-4, c+18, 4, 10); g.fillRect(c, c+18, 4, 10);
    g.lineStyle(3, 0x6B4A1A, 1);
    g.beginPath(); g.arc(S-10, c, 18, -1.2, 1.2); g.strokePath();
    g.lineStyle(1, 0xDDDDDD, 0.6);
    g.lineBetween(S-10+Math.cos(-1.2)*18, c+Math.sin(-1.2)*18, S-10+Math.cos(1.2)*18, c+Math.sin(1.2)*18);
    g.lineStyle(2, 0x888888, 0.8); g.lineBetween(c-4, c, S-2, c);
  });

  // Horde Ranger — dark troll with bow (64x64)
  genTex('h_ranger', S, S, (g) => {
    const c = S/2;
    g.fillStyle(0x5A3A1A, 1); g.fillTriangle(c, c-8, c-14, c+18, c+14, c+18);

    g.beginPath(); g.arc(10, c, 18, Math.PI-1.2, Math.PI+1.2); g.strokePath();
    g.lineStyle(2, 0x888888, 0.8); g.lineBetween(c+4, c, 2, c);

  // Alliance Mage — purple robed wizard with staff + orb (64x64)
  genTex('a_mage', S, S, (g) => {
    const c = S/2;
    g.fillStyle(0x5A3AAA, 1); g.fillTriangle(c, c-10, c-16, c+20, c+16, c+20);
    g.fillStyle(0x2A1A6A, 1); g.fillCircle(c, c-16, 9);
    g.fillStyle(0xDDB88A, 1); g.fillCircle(c, c-16, 5);
    g.fillStyle(0x2A1A6A, 1); g.fillRect(c-4, c+18, 4, 8); g.fillRect(c, c+18, 4, 8);

    g.fillStyle(0xAABBCC, 1); g.fillRect(c-4, c+18, 4, 8); g.fillRect(c, c+18, 4, 8);

  // Horde Priest — witch doctor (64x64)
  genTex('h_priest', S, S, (g) => {
    const c = S/2;
    g.fillStyle(0xAA8833, 1); g.fillTriangle(c, c-10, c-16, c+20, c+16, c+20);
    g.fillStyle(0x887722, 1); g.fillCircle(c, c-16, 9);

    g.fillStyle(0x333333, 1); g.fillCircle(c+12, c+2, 5);
    g.lineStyle(1.5, 0xffd700, 0.5); g.strokeRect(c+12, c-2, 18, 8);

  // Horde Siegemaster — orc with catapult (64x64)
  genTex('h_siege', S, S, (g) => {
    const c = S/2;
    g.fillStyle(0x8A4422, 1); g.fillRect(c-12, c-6, 24, 18);
    g.fillStyle(0x5A2A10, 1); g.fillRect(c-8, c+12, 7, 12); g.fillRect(c+1, c+12, 7, 12);
    g.fillStyle(0x5A8A3A, 1); g.fillCircle(c, c-12, 10);
    g.lineStyle(4, 0x5A3A1A, 1); g.lineBetween(4, c+14, 4, c-16);
    g.lineStyle(3, 0x5A3A1A, 1); g.lineBetween(4, c-16, 14, c-22);
    g.fillStyle(0x555555, 1); g.fillCircle(14, c-22, 5);

  // Glow ring textures (scaled up for 64px sprites)
  genTex('glow_blue', 80, 40, (g) => {

  genTex('glow_red', 80, 40, (g) => {

}

function pCreate() {
  phaserScene = this;
  cam = this.cameras.main;
  cam.setBounds(0, 0, MAP_W, MAP_H);

  // Zoom: fit full 4800 world width into screen width
  const zoom = this.scale.width / 4800;
  cam.setZoom(zoom);
  cam.centerOn(2400, 1200);

  // Dynamic layer for everything
  graphics = this.add.graphics();
  graphics.setDepth(5);

  // Night overlay
  nightOverlay = this.add.graphics();
  nightOverlay.setDepth(100);

  // Sun/Moon text
  sunMoonText = this.add.text(MAP_W - 80, 20, '\u2600', { fontSize: '32px', color: '#FFD700' });
  sunMoonText.setDepth(101).setScrollFactor(0);

  // No pan/scroll — full map always visible. Camera is locked.
}

// ─── Texture key lookup ─────────────────────────────────────────
function unitTexKey(unitType, faction) {
  const isA = faction === 'alliance';
  const map = {
    footman: 'a_knight', ironwarrior: 'h_knight',
    archer: 'a_ranger', shredder: 'h_ranger',
    gryphon: isA ? 'a_knight' : 'h_knight',
    warlock: isA ? 'a_mage' : 'h_mage',
    ballista: 'a_siege', colossus: 'h_siege',
  };
  return map[unitType] || (isA ? 'a_knight' : 'h_knight');
}

function heroTexKey(heroClass, faction) {
  const isA = faction === 'alliance';
  const map = {
    knight: isA ? 'a_knight' : 'h_knight',
    ranger: isA ? 'a_ranger' : 'h_ranger',
    mage: isA ? 'a_mage' : 'h_mage',
    priest: isA ? 'a_priest' : 'h_priest',
    siegemaster: isA ? 'a_siege' : 'h_siege',
  };
  return map[heroClass] || (isA ? 'a_knight' : 'h_knight');
}

function pUpdate() {
  if (!gameState || !graphics) return;
  graphics.clear();

  const gs = gameState;
  const isNight = gs.phase === 'night';
  const t = gs.tick;

  const halfW = MAP_W / 2;

  // ─── TERRAIN (drawn on dynamic graphics every frame — simple & reliable) ───
  const grassBase = isNight ? 0x1a3010 : 0x2D5A1B;
  const dirtBase  = isNight ? 0x2a1808 : 0x3A2010;
  const treeColor = 0x1A3A0A;
  // Single mid lane (multi-lane infrastructure kept server-side for future)
  const LANES = [{ name: 'mid', y: 1040, h: 320 }];
  const laneY = 1040, laneH = 320;

  // Left grass half — Alliance lush terrain
  graphics.fillStyle(grassBase, 1);
  graphics.fillRect(0, 0, halfW, MAP_H);

  // Grass grid seams
  graphics.lineStyle(1, isNight ? 0x122808 : 0x1A3A0A, 0.3);
  for (let gx = 36; gx < halfW; gx += 36) graphics.lineBetween(gx, 0, gx, MAP_H);
  for (let gy = 36; gy < MAP_H; gy += 36) graphics.lineBetween(0, gy, halfW, gy);

  // Lighter grass patches for variety
  graphics.fillStyle(isNight ? 0x1e3812 : 0x3A6A2A, 0.15);
  const grassPatches = [{x:400,y:300,r:60},{x:1000,y:200,r:45},{x:1600,y:400,r:55},
    {x:800,y:700,r:50},{x:1400,y:800,r:40},{x:300,y:1600,r:55},
    {x:900,y:1800,r:45},{x:1500,y:1700,r:50},{x:2000,y:2100,r:40}];
  for (const p of grassPatches) graphics.fillCircle(p.x, p.y, p.r);

  // Small ponds (blue water patches)
  const ponds = [{x:600,y:250,r:25},{x:1800,y:350,r:20},{x:400,y:2050,r:22},{x:1200,y:1750,r:18}];
  for (const p of ponds) {
    graphics.fillStyle(isNight ? 0x0A1520 : 0x1A3050, 0.4);
    graphics.fillCircle(p.x, p.y, p.r);
    graphics.fillStyle(isNight ? 0x1A3060 : 0x3060A0, 0.15);
    graphics.fillCircle(p.x - 3, p.y - 3, p.r * 0.5);
  }

  // Flower clusters
  const flowerSpots = [{x:350,y:200},{x:900,y:180},{x:1500,y:320},{x:700,y:750},
    {x:1300,y:680},{x:500,y:1850},{x:1100,y:2000},{x:1800,y:1800}];
  for (const f of flowerSpots) {
    for (let i = 0; i < 6; i++) {
      const fx = f.x - 10 + ((i * 7) & 19), fy = f.y - 8 + ((i * 11) & 15);
      const colors = [0xFFFF66, 0xFFFFFF, 0xFF99CC, 0xFFCC44];
      graphics.fillStyle(colors[i % 4], isNight ? 0.15 : 0.35);
      graphics.fillCircle(fx, fy, 2 + (i & 1));
    }
  }

  // Light fog/mist on Alliance upper area (holy glow)
  graphics.fillStyle(isNight ? 0x0A1A3A : 0x4A8FE0, 0.03);
  graphics.fillRect(0, 0, halfW, 400);

  // Right half — Mordor dark earth #1A0A00
  graphics.fillStyle(isNight ? 0x0A0500 : 0x1A0A00, 1);
  graphics.fillRect(halfW, 0, halfW, MAP_H);

  // Dark red fog overlay on upper Horde area
  graphics.fillStyle(0x330000, 0.2);
  graphics.fillRect(halfW, 0, halfW, 800);

  // Lava crack lines (orange #FF4400 at low opacity)
  graphics.lineStyle(3, 0xFF4400, 0.3);
  const lavaCracks = [
    [2500,300,2700,500], [2800,100,3000,400], [3200,600,3500,300],
    [3600,200,3800,500], [4000,400,4200,100], [4300,300,4500,600],
    [2600,1600,2900,1900], [3100,1700,3400,2000], [3800,1500,4100,1800],
    [4300,1700,4600,2100],
  ];
  for (const [x1,y1,x2,y2] of lavaCracks) {
    graphics.lineBetween(x1, y1, x2, y2);
    // Glow around crack
    graphics.lineStyle(8, 0xFF4400, 0.08);
    graphics.lineBetween(x1, y1, x2, y2);
    graphics.lineStyle(3, 0xFF4400, 0.3);
  }

  // Fire pit circles (animated glowing red)
  const firePits = [{x:2700,y:400}, {x:3300,y:250}, {x:3900,y:500}, {x:4400,y:350},
    {x:2800,y:1700}, {x:3400,y:1850}, {x:4000,y:1750}];
  for (const fp of firePits) {
    const flicker = Math.sin(t * 0.08 + fp.x * 0.01) * 0.04;
    graphics.fillStyle(0xFF2200, 0.08 + flicker);
    graphics.fillCircle(fp.x, fp.y, 55 + Math.sin(t * 0.06 + fp.y) * 5);
    graphics.fillStyle(0xFF4400, 0.15 + flicker);
    graphics.fillCircle(fp.x, fp.y, 30);
    graphics.fillStyle(0xFFAA00, 0.2 + flicker);
    graphics.fillCircle(fp.x, fp.y, 12);
    graphics.fillStyle(0xFFDD44, 0.15);
    graphics.fillCircle(fp.x, fp.y, 5);
    // Ember particles rising
    for (let e = 0; e < 3; e++) {
      const ex = fp.x + Math.sin(t * 0.1 + e * 2 + fp.x) * 20;
      const ey = fp.y - 20 - ((t * 0.5 + e * 30 + fp.x) % 60);
      graphics.fillStyle(0xFF6600, 0.3 - ((t * 0.5 + e * 30 + fp.x) % 60) / 60 * 0.3);
      graphics.fillCircle(ex, ey, 2);
    }
  }

  // Dead twisted trees — dark #1A0A0A with red tint tips
  const mordorTrees = [
    {x:2600,y:200}, {x:2900,y:550}, {x:3200,y:150}, {x:3500,y:450},
    {x:3800,y:250}, {x:4100,y:600}, {x:4500,y:300}, {x:4700,y:500},
  ];
  for (const mt of mordorTrees) {
    const th = 50 + ((mt.x * 7) & 30);
    // Red glow at base of each dead tree
    graphics.fillStyle(0x660000, 0.12);
    graphics.fillCircle(mt.x, mt.y + th, 30);
    // Trunk — higher opacity for visibility
    graphics.fillStyle(0x1A0A0A, 1);
    graphics.fillRect(mt.x - 5, mt.y, 10, th);
    // Branches — thicker and more visible
    graphics.lineStyle(4, 0x1A0A0A, 0.85);
    graphics.lineBetween(mt.x, mt.y + 8, mt.x - 24, mt.y - 18);
    graphics.lineBetween(mt.x, mt.y + 14, mt.x + 22, mt.y - 12);
    graphics.lineBetween(mt.x - 24, mt.y - 18, mt.x - 34, mt.y - 36);
    graphics.lineBetween(mt.x + 22, mt.y - 12, mt.x + 32, mt.y - 34);
    // Red tint on branch tips
    graphics.fillStyle(0x550000, 0.5);
    graphics.fillCircle(mt.x - 34, mt.y - 36, 6);
    graphics.fillCircle(mt.x + 32, mt.y - 34, 6);
  }

  // Subtle scorched earth seams
  graphics.lineStyle(1, 0x0A0500, 0.3);
  for (let gx = halfW + 60; gx < MAP_W; gx += 60) graphics.lineBetween(gx, 0, gx, MAP_H);
  for (let gy = 60; gy < MAP_H; gy += 60) graphics.lineBetween(halfW, gy, MAP_W, gy);

  // Thin red danger border at very bottom of Horde side
  graphics.fillStyle(0x880000, 0.6);
  graphics.fillRect(halfW, MAP_H - 6, halfW, 6);
  graphics.fillStyle(0xCC0000, 0.3);
  graphics.fillRect(halfW, MAP_H - 20, halfW, 20);

  // ─── 3 LANE ROADS ──────────────────────────────────────────
  for (const lane of LANES) {
    // Alliance half
    graphics.fillStyle(isNight ? 0x3a3018 : 0x6B5A3A, 1);
    graphics.fillRect(0, lane.y, halfW, lane.h);
    // Horde half — scorched
    graphics.fillStyle(isNight ? 0x1a0a00 : 0x2A1500, 1);
    graphics.fillRect(halfW, lane.y, halfW, lane.h);
    // Road seam lines
    graphics.lineStyle(1, isNight ? 0x2a2010 : 0x5A4A2A, 0.25);
    for (let ry = lane.y + 20; ry < lane.y + lane.h; ry += 40) graphics.lineBetween(0, ry, MAP_W, ry);
    // Road edges
    graphics.lineStyle(2, isNight ? 0x1a1508 : 0x4A3A1A, 0.5);
    graphics.lineBetween(0, lane.y, MAP_W, lane.y);
    graphics.lineBetween(0, lane.y + lane.h, MAP_W, lane.y + lane.h);
    // Lane label
    graphics.fillStyle(0xC8960C, 0.15);
  }

  // ─── JUNGLE CAMPS (between lanes) ─────────────────────────
  if (gs.camps) {
    for (const camp of gs.camps) {
      // Camp ground circle
      const campAlive = camp.monsters && camp.monsters.some(m => m.alive);
      if (campAlive) {
        graphics.fillStyle(0x2A4A1A, 0.3);
        graphics.fillCircle(camp.x, camp.y, 50);
        graphics.lineStyle(1, 0x4A6A2A, 0.3);
        graphics.strokeCircle(camp.x, camp.y, 50);
        // Monster dots
        for (const m of camp.monsters) {
          if (!m.alive) continue;
          graphics.fillStyle(camp.isBoss ? 0xCC8800 : 0x88AA44, 0.9);
          graphics.fillCircle(m.x, m.y, camp.isBoss ? 14 : 10);
          graphics.fillStyle(0x000000, 0.3);
          graphics.fillCircle(m.x, m.y, camp.isBoss ? 6 : 4);
          // HP bar
          if (m.hp < m.maxHp) {
            const mPct = m.hp / m.maxHp;
            graphics.fillStyle(0x0D1520, 0.8);
            graphics.fillRect(m.x - 12, m.y - 18, 24, 4);
            graphics.fillStyle(0x44AA22, 0.9);
            graphics.fillRect(m.x - 12, m.y - 18, 24 * mPct, 4);
          }
        }
        // Camp label
        if (camp.isBoss) {
          graphics.fillStyle(0xCC8800, 0.25);
          graphics.fillCircle(camp.x, camp.y, 65);
        }
      } else {
        // Cleared camp — dim circle
        graphics.fillStyle(0x1A1A0A, 0.15);
        graphics.fillCircle(camp.x, camp.y, 30);
      }
    }
  }

  // ─── 30 TREES — TOP AREA (Y 80 to 380, above top lane) ──
  for (let i = 0; i < 30; i++) {
    const tx = 60 + ((i * 97 + 31) % (MAP_W - 120));
    const ty = 80 + ((i * 193 + 59) % 280);
    const th = 60 + ((i * 7) % 30); // 60-90px tall
    const tw = 20 + ((i * 3) % 20); // 20-40px wide
    const isAlliance = tx < 2400;

    if (isAlliance) {
      // Bright green healthy tree #2A6A1A
      graphics.fillStyle(0x2A6A1A, isNight ? 0.5 : 0.75);
      graphics.fillTriangle(tx, ty - th, tx - tw, ty, tx + tw, ty);
      // Second canopy layer
      graphics.fillStyle(0x2A6A1A, isNight ? 0.35 : 0.55);
      graphics.fillTriangle(tx, ty - th - 15, tx - tw * 0.7, ty - th * 0.4, tx + tw * 0.7, ty - th * 0.4);
      // Trunk
      graphics.fillStyle(isNight ? 0x1A2A0A : 0x2A3A1A, 0.6);
      graphics.fillRect(tx - 3, ty, 6, 12);
    } else {
      // Dead twisted tree — dark #3A2A0A + purple tint
      graphics.fillStyle(0x3A2A0A, isNight ? 0.5 : 0.75);
      graphics.fillRect(tx - 4, ty - th * 0.3, 8, th * 0.85);
      // Purple corruption at base
      graphics.fillStyle(0x2A1A2A, 0.2);
      graphics.fillCircle(tx, ty + 5, tw * 0.5);
      graphics.lineStyle(3, 0x3A2A0A, isNight ? 0.45 : 0.65);
      graphics.lineBetween(tx, ty - th * 0.2, tx - tw * 0.7, ty - th * 0.6);
      graphics.lineBetween(tx, ty - th * 0.15, tx + tw * 0.6, ty - th * 0.5);
      graphics.lineBetween(tx - tw * 0.7, ty - th * 0.6, tx - tw, ty - th * 0.85);
      graphics.lineBetween(tx + tw * 0.6, ty - th * 0.5, tx + tw * 0.8, ty - th * 0.8);
    }
  }

  // ─── 30 TREES — BOTTOM AREA (Y 2020 to 2350, below bot lane) ─
  for (let i = 0; i < 30; i++) {
    const tx = 60 + ((i * 109 + 43) % (MAP_W - 120));
    const ty = 2020 + ((i * 181 + 71) % 320);
    const th = 60 + ((i * 11) % 30);
    const tw = 20 + ((i * 5) % 20);
    const isAlliance = tx < 2400;

    if (isAlliance) {
      graphics.fillStyle(0x2A6A1A, isNight ? 0.5 : 0.75);
      graphics.fillTriangle(tx, ty - th, tx - tw, ty, tx + tw, ty);
      graphics.fillStyle(0x2A6A1A, isNight ? 0.35 : 0.55);
      graphics.fillTriangle(tx, ty - th - 15, tx - tw * 0.7, ty - th * 0.4, tx + tw * 0.7, ty - th * 0.4);
      graphics.fillStyle(isNight ? 0x1A2A0A : 0x2A3A1A, 0.6);
      graphics.fillRect(tx - 3, ty, 6, 12);
    } else {
      graphics.fillStyle(0x4A2A0A, isNight ? 0.45 : 0.7);
      graphics.fillRect(tx - 3, ty - th * 0.3, 6, th * 0.8);
      graphics.lineStyle(3, 0x4A2A0A, isNight ? 0.4 : 0.6);
      graphics.lineBetween(tx, ty - th * 0.2, tx - tw * 0.7, ty - th * 0.6);
      graphics.lineBetween(tx, ty - th * 0.15, tx + tw * 0.6, ty - th * 0.5);
      graphics.lineBetween(tx - tw * 0.7, ty - th * 0.6, tx - tw, ty - th * 0.85);
      graphics.lineBetween(tx + tw * 0.6, ty - th * 0.5, tx + tw * 0.8, ty - th * 0.8);
    }
  }

  // ─── JUNGLE TREES (between lanes) ──────────────────────
  // Between top and mid lanes (Y 620-1020)
  for (let i = 0; i < 25; i++) {
    const tx = 100 + ((i * 191 + 37) % (MAP_W - 200));
    const ty = 640 + ((i * 157 + 53) % 360);
    const th = 50 + ((i * 7) % 25);
    const tw = 18 + ((i * 3) % 14);
    const isAlliance = tx < 2400;
    graphics.fillStyle(isAlliance ? 0x1A4A0A : 0x2A1A0A, isNight ? 0.4 : 0.55);
    graphics.fillTriangle(tx, ty - th, tx - tw, ty, tx + tw, ty);
    graphics.fillStyle(isAlliance ? 0x0A2A0A : 0x1A0A0A, 0.4);
    graphics.fillRect(tx - 2, ty, 4, 8);
  }
  // Between mid and bot lanes (Y 1380-1780)
  for (let i = 0; i < 25; i++) {
    const tx = 100 + ((i * 173 + 41) % (MAP_W - 200));
    const ty = 1400 + ((i * 163 + 67) % 360);
    const th = 50 + ((i * 11) % 25);
    const tw = 18 + ((i * 5) % 14);
    const isAlliance = tx < 2400;
    graphics.fillStyle(isAlliance ? 0x1A4A0A : 0x2A1A0A, isNight ? 0.4 : 0.55);
    graphics.fillTriangle(tx, ty - th, tx - tw, ty, tx + tw, ty);
    graphics.fillStyle(isAlliance ? 0x0A2A0A : 0x1A0A0A, 0.4);
    graphics.fillRect(tx - 2, ty, 4, 8);
  }

  // ─── TERRAIN DECORATIONS — rocks, bushes, flowers ──────
  // Alliance side — rocks and bushes
  const allianceDecos = [
    {x:300,y:200,t:'rock'},{x:800,y:150,t:'bush'},{x:1200,y:300,t:'rock'},
    {x:1700,y:180,t:'bush'},{x:500,y:2200,t:'rock'},{x:1000,y:2100,t:'bush'},
    {x:1500,y:2250,t:'rock'},{x:2000,y:2150,t:'bush'},
    {x:400,y:700,t:'bush'},{x:900,y:800,t:'rock'},{x:1400,y:750,t:'bush'},
    {x:600,y:1500,t:'rock'},{x:1100,y:1600,t:'bush'},{x:1800,y:1550,t:'rock'},
  ];
  for (const d of allianceDecos) {
    if (d.t === 'rock') {
      graphics.fillStyle(isNight ? 0x2A3A2A : 0x4A5A4A, 0.5);
      graphics.fillCircle(d.x, d.y, 12);
      graphics.fillStyle(isNight ? 0x3A4A3A : 0x5A6A5A, 0.3);
      graphics.fillCircle(d.x - 3, d.y - 3, 6);
    } else {
      graphics.fillStyle(isNight ? 0x1A3A1A : 0x2A5A2A, 0.5);
      graphics.fillCircle(d.x, d.y, 10);
      graphics.fillCircle(d.x + 8, d.y + 4, 8);
      graphics.fillCircle(d.x - 6, d.y + 3, 7);
    }
  }

  // Horde side — skulls and bones scattered
  const hordeDecos = [
    {x:2700,y:200},{x:3200,y:300},{x:3700,y:150},{x:4200,y:280},
    {x:2800,y:2200},{x:3300,y:2100},{x:3800,y:2250},{x:4300,y:2150},
    {x:2900,y:700},{x:3400,y:800},{x:3900,y:750},
    {x:3000,y:1500},{x:3500,y:1600},{x:4000,y:1550},
  ];
  for (const d of hordeDecos) {
    // Small bone/skull
    graphics.fillStyle(0xD4C8A0, 0.2);
    graphics.fillCircle(d.x, d.y, 6);
    graphics.fillStyle(0x1A0A00, 0.3);
    graphics.fillCircle(d.x - 2, d.y - 1, 1.5);
    graphics.fillCircle(d.x + 2, d.y - 1, 1.5);
  }

  // ─── MAGICAL RIVER DIVIDER at x=2400 ──────────────────
  // River bed
  graphics.fillStyle(isNight ? 0x0A1825 : 0x1A3050, 0.6);
  graphics.fillRect(halfW - 30, 0, 60, MAP_H);

  // Flowing water segments with animated wave
  for (let ry = 0; ry < MAP_H; ry += 6) {
    const wave = Math.sin(ry * 0.02 + t * 0.04) * 8;
    const alpha = 0.25 + Math.sin(ry * 0.01 + t * 0.03) * 0.08;
    graphics.fillStyle(isNight ? 0x1A3055 : 0x2A5080, alpha);
    graphics.fillRect(halfW - 18 + wave, ry, 36, 6);
  }

  // Water highlights / shimmer
  for (let ry = 0; ry < MAP_H; ry += 25) {
    const sx2 = halfW + Math.sin(ry * 0.04 + t * 0.05) * 10;
    graphics.fillStyle(isNight ? 0x3060A0 : 0x5090CC, 0.2);
    graphics.fillRect(sx2 - 3, ry, 6, 3);
  }

  // Gold energy core running through the center
  graphics.fillStyle(0xF0C040, 0.15);
  graphics.fillRect(halfW - 3, 0, 6, MAP_H);
  graphics.fillStyle(0xF0C040, 0.7);
  graphics.fillRect(halfW - 1, 0, 2, MAP_H);

  // Floating magical particles along the river
  for (let ry = 0; ry < MAP_H; ry += 40) {
    const px = halfW + Math.sin(ry * 0.03 + t * 0.06) * 12;
    const py = ry + Math.cos(ry * 0.02 + t * 0.04) * 8;
    const pAlpha = 0.3 + Math.sin(ry * 0.05 + t * 0.08) * 0.2;
    graphics.fillStyle(0xFFD700, pAlpha);
    graphics.fillCircle(px, py, 2);
    // Secondary blue particle
    graphics.fillStyle(0x66AAFF, pAlpha * 0.6);
    graphics.fillCircle(px + 8, py + 12, 1.5);
  }

  // River bank edges
  graphics.lineStyle(2, isNight ? 0x1A2A10 : 0x3A4A2A, 0.5);
  graphics.lineBetween(halfW - 30, 0, halfW - 30, MAP_H);
  graphics.lineBetween(halfW + 30, 0, halfW + 30, MAP_H);

  // ─── STRUCTURES (drawn with graphics each frame) ──────────
  for (const s of gs.structures) {
    if (!s.alive) { graphics.fillStyle(0x333333, 0.3); graphics.fillRect(s.x - 15, s.y - 10, 30, 20); continue; }
    drawStructure(s, t, isNight);
  }

  // ─── UNITS + HEROES as Phaser sprites ─────────────────────
  _renderedPositions.length = 0; // clear proximity tracking each frame
  const activeIds = new Set();

  for (const u of gs.units) {
    if (!u.alive) continue;
    activeIds.add(u.id);
    renderSprite(u.id, unitTexKey(u.unitType, u.faction), u, t, false);
  }
  for (const h of gs.heroes) {
    if (!h.alive) continue;
    activeIds.add(h.id);
    renderSprite(h.id, heroTexKey(h.heroClass, h.faction), h, t, true);
  }

  // Remove stale sprites
  for (const id in spritePool) {
    if (!activeIds.has(id)) {
      // Death animation
      const sp = spritePool[id];
      if (sp.alpha > 0) {
        phaserScene.tweens.add({ targets: sp, alpha: 0, angle: 360, scaleX: 0.2, scaleY: 0.2, duration: 400, onComplete: () => { sp.destroy(); } });
        // Death sparks
        for (let i = 0; i < 6; i++) {
          const spark = phaserScene.add.circle(sp.x, sp.y, 3, sp.getData('isAlliance') ? 0x4A8FE0 : 0xE24B4A).setDepth(50);
          phaserScene.tweens.add({
            targets: spark, x: sp.x + (Math.random() - 0.5) * 80, y: sp.y + (Math.random() - 0.5) * 80,
            alpha: 0, duration: 500, onComplete: () => spark.destroy()
          });
        }
      }
      if (sp._glow) sp._glow.destroy();
      if (sp._label) sp._label.destroy();
      delete spritePool[id];
      if (hpBarPool[id]) { hpBarPool[id].bg.destroy(); hpBarPool[id].fill.destroy(); hpBarPool[id].lvl.destroy(); delete hpBarPool[id]; }
    }
  }

  // ─── PROJECTILES with ability effects ───────────────────────
  for (const p of gs.projectiles) {
    const cx = p.fx + (p.tx - p.fx) * p.p, cy = p.fy + (p.ty - p.fy) * p.p;
    const pColor = parseInt(p.color.replace('#', ''), 16);

    // Outer glow trail
    graphics.fillStyle(pColor, 0.08);
    graphics.fillCircle(cx, cy, 20);

    // Trail particles behind projectile
    for (let i = 1; i <= 4; i++) {
      const tp = p.p - i * 0.03;
      if (tp < 0) break;
      const tx2 = p.fx + (p.tx - p.fx) * tp, ty2 = p.fy + (p.ty - p.fy) * tp;
      graphics.fillStyle(pColor, 0.25 - i * 0.05);
      graphics.fillCircle(tx2, ty2, 4 - i * 0.6);
    }

    // Main projectile body
    graphics.fillStyle(pColor, 0.3); graphics.fillCircle(cx, cy, 10);
    graphics.fillStyle(pColor, 0.95); graphics.fillCircle(cx, cy, 5);
    graphics.fillStyle(0xffffff, 0.6); graphics.fillCircle(cx, cy, 2);

    // Impact spark at target when nearly arrived
    if (p.p > 0.85) {
      const sparkA = (p.p - 0.85) / 0.15;
      graphics.fillStyle(0xFFFFFF, sparkA * 0.4);
      graphics.fillCircle(p.tx, p.ty, 12 * sparkA);
      graphics.fillStyle(pColor, sparkA * 0.3);
      graphics.fillCircle(p.tx, p.ty, 20 * sparkA);
    }

    // Cast origin flash (when projectile just spawned)
    if (p.p < 0.15) {
      const castA = 1 - p.p / 0.15;
      graphics.fillStyle(pColor, castA * 0.2);
      graphics.fillCircle(p.fx, p.fy, 15);
    }
  }

  // ─── DAMAGE NUMBERS (float up and fade) ────────────────────
  // Track HP changes
  const newHpMap = {};
  for (const u of gs.units) newHpMap[u.id] = u.hp;
  for (const h of gs.heroes) newHpMap[h.id] = h.hp;
  for (const id in prevHpMap) {
    if (newHpMap[id] !== undefined && newHpMap[id] < prevHpMap[id]) {
      const diff = prevHpMap[id] - newHpMap[id];
      const entity = gs.units.find(u => u.id === id) || gs.heroes.find(h => h.id === id);
      if (entity && diff > 0) {
        const txt = phaserScene.add.text(entity.x, entity.y - 30, `-${diff}`, {
          fontSize: '16px', fontFamily: 'Cinzel', color: '#F0C040', fontStyle: 'bold',
          stroke: '#000', strokeThickness: 2,
        }).setOrigin(0.5).setDepth(90);
        phaserScene.tweens.add({ targets: txt, y: entity.y - 80, alpha: 0, duration: 1000, onComplete: () => txt.destroy() });
      }
    }
  }
  prevHpMap = newHpMap;

  // ─── FLOATING GOLD NUMBERS ─────────────────────────────────
  if (!window._prevGoldMap) window._prevGoldMap = {};
  for (const h of gs.heroes) {
    const prev = window._prevGoldMap[h.id];
    if (prev !== undefined && h.gold > prev) {
      const gain = h.gold - prev;
      if (gain >= 100) sfxGold();
      const txt = phaserScene.add.text(h.x + 20, h.y - 50, `+${gain}g`, {
        fontSize: '18px', fontFamily: 'Cinzel', color: '#FFD700', fontStyle: 'bold',
        stroke: '#000', strokeThickness: 2,
      }).setOrigin(0.5).setDepth(91);
      phaserScene.tweens.add({ targets: txt, y: h.y - 120, alpha: 0, duration: 1200, onComplete: () => txt.destroy() });
    }
    window._prevGoldMap[h.id] = h.gold;
  }

  // ─── DEATH EFFECTS — dramatic explosion ─────────────────────
  deathEffects = deathEffects.filter(fx => {
    fx.age++;
    const prog = fx.age / fx.maxAge, alpha = 1 - prog;

    // Expanding shockwave rings
    graphics.lineStyle(4 - prog * 3, fx.color, alpha * 0.6);
    graphics.strokeCircle(fx.x, fx.y, 10 + prog * 60);
    graphics.lineStyle(2, fx.color, alpha * 0.3);
    graphics.strokeCircle(fx.x, fx.y, 5 + prog * 40);

    // Inner flash
    graphics.fillStyle(0xffffff, alpha * 0.5);
    graphics.fillCircle(fx.x, fx.y, 10 * (1 - prog));

    // Scatter particles (8 directions)
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2 + fx.age * 0.08;
      const dist = prog * 55;
      const px = fx.x + Math.cos(angle) * dist;
      const py = fx.y + Math.sin(angle) * dist;
      graphics.fillStyle(fx.color, alpha * 0.7);
      graphics.fillCircle(px, py, 3 * (1 - prog));
    }

    // Skull flash at center for hero deaths
    if (fx.age < 10) {
      graphics.fillStyle(0xD4C8A0, (10 - fx.age) / 10 * 0.4);
      graphics.fillCircle(fx.x, fx.y, 15);
    }

    return fx.age < fx.maxAge;
  });

  // ─── Level Up — golden burst with rising text ──────────────
  levelUpEffects = levelUpEffects.filter(fx => {
    fx.age++;
    const prog = fx.age / 40, alpha = 1 - prog;

    // Golden expanding ring
    graphics.lineStyle(3, 0xffd700, alpha * 0.8);
    graphics.strokeCircle(fx.x, fx.y, 8 + prog * 45);
    // Second ring
    graphics.lineStyle(1.5, 0xF0C040, alpha * 0.4);
    graphics.strokeCircle(fx.x, fx.y, 15 + prog * 30);

    // Rising golden stars
    for (let i = 0; i < 6; i++) {
      const angle = (i / 6) * Math.PI * 2 + fx.age * 0.12;
      const r = 12 + prog * 30;
      graphics.fillStyle(0xffd700, alpha * 0.7);
      graphics.fillCircle(fx.x + Math.cos(angle) * r, fx.y + Math.sin(angle) * r - prog * 20, 2.5);
    }

    // "LEVEL UP" flash
    if (fx.age < 15) {
      graphics.fillStyle(0xffd700, (15 - fx.age) / 15 * 0.3);
      graphics.fillCircle(fx.x, fx.y, 25);
    }

    return fx.age < 40;
  });

  // ─── NIGHT OVERLAY ─────────────────────────────────────────
  nightOverlay.clear();
  if (isNight) {
    nightOverlay.fillStyle(0x000022, 0.4);
    nightOverlay.fillRect(0, 0, MAP_W, MAP_H);
    nightOverlay.fillStyle(0x000010, 0.15);
    nightOverlay.fillRect(0, 0, MAP_W, 200);
    nightOverlay.fillRect(0, MAP_H - 200, MAP_W, 200);
    nightOverlay.fillStyle(0x1a2a5a, 0.06);
    nightOverlay.fillCircle(MAP_W / 2, MAP_H / 2, 600);
  }
  sunMoonText.setText(isNight ? '\uD83C\uDF19' : '\u2600\uFE0F');
  sunMoonText.setPosition(cam.scrollX + cam.width / cam.zoom - 60, cam.scrollY + 10);
}

// ─── Track all rendered positions for label proximity check ──────
const _renderedPositions = [];

// ─── Sprite rendering ────────────────────────────────────────────
function renderSprite(id, texKey, entity, t, isHero) {
  const isA = entity.faction === 'alliance';
  const bob = Math.sin(t * 0.08 + (entity.x || 0) * 0.01) * 3;

  // HARD CLAMP — all units in mid lane
  const clampedY = Math.max(1040, Math.min(1360, entity.y));

  // Create or reuse sprite
  let sp = spritePool[id];
  if (!sp) {
    sp = phaserScene.add.sprite(entity.x, clampedY, texKey).setDepth(10);
    sp.setData('isAlliance', isA);
    spritePool[id] = sp;

    // Glow ring — 60% smaller (scale 1.2 instead of 3), opacity 0.2
    const glowKey = isA ? 'glow_blue' : 'glow_red';
    sp._glow = phaserScene.add.image(entity.x, clampedY + 40, glowKey).setDepth(9).setScale(1.2).setAlpha(0.2);

    // Name label
    const classNames = { footman:'Knight', ironwarrior:'Knight', archer:'Ranger', shredder:'Ranger',
      gryphon:'Gryphon', warlock:'Mage', ballista:'Siege', colossus:'Siege',
      knight:'Knight', ranger:'Ranger', mage:'Mage', priest:'Priest', siegemaster:'Siege' };
    const labelText = classNames[entity.heroClass || entity.unitType] || '';
    sp._label = phaserScene.add.text(entity.x, clampedY + 50, labelText, {
      fontSize: '10px', fontFamily: 'Cinzel', color: '#ffffff',
      backgroundColor: '#00000088', padding: { x: 3, y: 1 },
    }).setOrigin(0.5, 0).setDepth(22);
  }

  // Update position — always clamped
  sp.setPosition(entity.x, clampedY + bob);
  sp.setFlipX(!isA);
  sp.setScale(isHero ? 4.0 : 3.0);
  sp.setAlpha(1);
  sp.setAngle(0);

  // Glow — small and subtle
  if (sp._glow) {
    sp._glow.setPosition(entity.x, clampedY + 42);
    sp._glow.setAlpha(0.2);
  }

  // Label — hide if another unit is within 60px (proximity check)
  if (sp._label) {
    let tooClose = false;
    for (const pos of _renderedPositions) {
      const dx = entity.x - pos.x, dy = clampedY - pos.y;
      if (Math.sqrt(dx * dx + dy * dy) < 60) { tooClose = true; break; }
    }
    if (tooClose) {
      sp._label.setVisible(false);
    } else {
      sp._label.setVisible(true);
      sp._label.setPosition(entity.x, clampedY + 52 + bob);
    }
  }
  _renderedPositions.push({ x: entity.x, y: clampedY });

  // Attack flash
  if (entity.currentAttackCd !== undefined && entity.currentAttackCd > 15) {
    sp.setTint(0xffffff);
  } else {
    sp.clearTint();
  }

  // HP bar above unit — 120px wide (visible at zoom-out)
  const hp = entity.hp, maxHp = entity.maxHp;
  const barW = isHero ? 140 : 100;
  let bar = hpBarPool[id];
  if (!bar) {
    const bg = phaserScene.add.rectangle(entity.x, clampedY - 80, barW + 4, 12, 0x0D1520).setDepth(20).setOrigin(0.5);
    const fill = phaserScene.add.rectangle(entity.x - barW/2, clampedY - 80, barW, 8, 0x44AA22).setDepth(21).setOrigin(0, 0.5);
    const lvl = phaserScene.add.text(entity.x, clampedY - 100, '', { fontSize: '22px', color: '#ffd700', fontFamily: 'Cinzel', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 }).setDepth(22).setOrigin(0.5);
    bar = { bg, fill, lvl };
    hpBarPool[id] = bar;
  }
  const pct = Math.max(0, hp / maxHp);
  const barColor = pct < 0.3 ? 0xff3333 : 0x44AA22;
  bar.bg.setPosition(entity.x, clampedY - 80 + bob);
  bar.fill.setPosition(entity.x - barW/2, clampedY - 80 + bob);
  bar.fill.displayWidth = barW * pct;
  bar.fill.setFillStyle(barColor);
  bar.lvl.setPosition(entity.x, clampedY - 104 + bob);
  bar.lvl.setText(entity.level !== undefined ? `${entity.level}` : '');
}

// ─── Draw Structures (still graphics-based for detail) ───────────
function drawStructure(s, t, isNight) {
  const isA = s.faction === 'alliance';
  const primary = isA ? 0x3366cc : 0xcc3333;
  const dark = isA ? 0x1a3366 : 0x661a1a;
  const gold = 0xffd700;

  if (s.structureType === 'base' && isA) {
    // ═══ ALLIANCE HUMAN KEEP at (150, 1200) — Warcraft style ═══
    const cx = 150, cy = 1200;

    // ── Soft blue holy glow ──
    graphics.fillStyle(0x4A8FE0, 0.1 + Math.sin(t * 0.03) * 0.05);
    graphics.fillCircle(cx, cy, 280);
    graphics.fillStyle(0x2244AA, 0.04);
    graphics.fillCircle(cx, cy - 100, 200);

    // ── TIER 1: Wide stone foundation ──
    graphics.fillStyle(0x6A7A8A, 1);
    graphics.fillRect(cx - 200, cy + 60, 400, 160);
    // Stone brick texture
    graphics.fillStyle(0x5A6A7A, 0.5);
    for (let px = -180; px < 180; px += 38) {
      for (let py = 70; py < 210; py += 30) {
        graphics.fillRect(cx + px + ((px*3)&6), cy + py + ((py*7)&4), 22, 14);
